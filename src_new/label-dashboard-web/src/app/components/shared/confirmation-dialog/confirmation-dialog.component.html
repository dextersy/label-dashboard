<!-- Modal backdrop -->
<div *ngIf="isVisible" class="modal-backdrop fade show" (click)="onBackdropClick($event)"></div>

<!-- Modal -->
<div *ngIf="isVisible"
     class="modal fade show"
     style="display: block"
     tabindex="-1"
     role="dialog"
     aria-modal="true"
     [attr.aria-labelledby]="'confirmation-dialog-title'"
     [attr.aria-describedby]="'confirmation-dialog-message'"
     (keydown)="onKeyDown($event)">
  <div #modalDialog class="modal-dialog modal-dialog-centered cd-modal-dialog" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content cd-modal-content">

      <!-- Header -->
      <div class="cd-modal-header" [ngClass]="{
        'cd-header-info':    data?.type === 'info' || !data?.type,
        'cd-header-warning': data?.type === 'warning',
        'cd-header-danger':  data?.type === 'danger'
      }">
        <div class="cd-header-left">
          <span class="cd-icon-badge" [ngClass]="{
            'cd-icon-info':    data?.type === 'info' || !data?.type,
            'cd-icon-warning': data?.type === 'warning',
            'cd-icon-danger':  data?.type === 'danger'
          }">
            <app-icon [name]="(data?.type === 'danger' || data?.type === 'warning') ? 'warning' : 'info'" iconOnly />
          </span>
          <h5 class="cd-modal-title" id="confirmation-dialog-title">{{ data?.title }}</h5>
        </div>
        <button type="button" class="cd-close-btn" (click)="onCancel()" aria-label="Close">&#x2715;</button>
      </div>

      <!-- Body -->
      <div class="modal-body cd-modal-body">
        <p id="confirmation-dialog-message" class="cd-primary-text">{{ data?.message }}</p>
      </div>

      <!-- Footer -->
      <div class="cd-modal-footer">
        <button type="button"
                class="cd-btn"
                [ngClass]="data?.primaryAction === 'cancel' ? getCancelPrimaryClass() : 'cd-btn-cancel'"
                (click)="onCancel()">
          {{ data?.cancelText || 'No' }}
        </button>
        <button #confirmButton
                type="button"
                class="cd-btn"
                [ngClass]="data?.primaryAction === 'cancel' ? 'cd-btn-cancel' : getConfirmClass()"
                (click)="onConfirm()">
          {{ data?.confirmText || 'Yes' }}
        </button>
      </div>

    </div>
  </div>
</div>
