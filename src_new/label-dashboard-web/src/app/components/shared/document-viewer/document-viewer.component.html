<div class="document-viewer-overlay" *ngIf="isVisible" (click)="onBackdropClick($event)">
  <div class="document-viewer-modal">
    <div class="document-viewer-header">
      <div class="document-info">
        <app-icon [name]="getFileIcon()" />
        <div class="document-details">
          <h5 class="document-title">{{ document?.title }}</h5>
          <small class="document-filename tw-text-muted">{{ document?.filename }}</small>
        </div>
      </div>
      <div class="document-actions">
        <button 
          type="button" 
          class="btn-secondary btn-sm tw-mr-2"
          (click)="downloadDocument()"
          title="Download">
          <app-icon name="download" />
        </button>
        <button 
          type="button" 
          class="btn-secondary btn-sm tw-mr-2"
          (click)="openInNewTab()"
          title="Open in new tab">
          <app-icon name="external-link" />
        </button>
        <button 
          type="button" 
          class="btn-secondary btn-sm"
          (click)="onClose()"
          title="Close">
          <app-icon name="x" />
        </button>
      </div>
    </div>

    <div class="document-viewer-content">
      <!-- Loading indicator -->
      <div *ngIf="loading" class="document-loading">
        <div class="loading-dots">
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>

      <!-- PDF Viewer -->
      <div *ngIf="documentType === 'pdf'" class="pdf-viewer">
        <iframe 
          [src]="safeUrl"
          width="100%" 
          height="100%"
          frameborder="0"
          (load)="onPdfLoad()"
          [style.display]="loading ? 'none' : 'block'">
        </iframe>
      </div>

      <!-- Image Viewer -->
      <div *ngIf="documentType === 'image'" class="image-viewer">
        <img 
          [src]="document?.url" 
          [alt]="document?.title"
          class="document-image"
          (load)="onImageLoad()"
          (error)="onImageError()"
          [style.display]="loading ? 'none' : 'block'">
      </div>

      <!-- Office Documents -->
      <div *ngIf="documentType === 'office'" class="office-viewer">
        <div class="office-preview">
          <app-icon [name]="getFileIcon()" [size]="48" />
          <h3 class="tw-mt-3">{{ document?.title }}</h3>
          <p class="tw-text-muted">Office documents cannot be previewed directly.</p>
          <div class="tw-mt-3">
            <button 
              type="button" 
              class="btn-primary tw-mr-2"
              (click)="downloadDocument()">
              <app-icon name="download" class="tw-mr-1" />
              Download Document
            </button>
            <button 
              type="button" 
              class="btn-secondary"
              (click)="openInNewTab()">
              <app-icon name="external-link" class="tw-mr-1" />
              Open in New Tab
            </button>
          </div>
        </div>
      </div>

      <!-- Text Documents -->
      <div *ngIf="documentType === 'text'" class="text-viewer">
        <iframe 
          [src]="safeUrl"
          width="100%" 
          height="100%"
          frameborder="0"
          (load)="onPdfLoad()"
          [style.display]="loading ? 'none' : 'block'">
        </iframe>
      </div>

      <!-- Unsupported Documents -->
      <div *ngIf="documentType === 'unsupported'" class="unsupported-viewer">
        <div class="unsupported-preview">
          <app-icon name="file" class="fa-5x tw-text-muted" />
          <h3 class="tw-mt-3">{{ document?.title }}</h3>
          <p class="tw-text-muted">This file type cannot be previewed.</p>
          <div class="tw-mt-3">
            <button 
              type="button" 
              class="btn-primary tw-mr-2"
              (click)="downloadDocument()">
              <app-icon name="download" class="tw-mr-1" />
              Download Document
            </button>
            <button 
              type="button" 
              class="btn-secondary"
              (click)="openInNewTab()">
              <app-icon name="external-link" class="tw-mr-1" />
              Open in New Tab
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
