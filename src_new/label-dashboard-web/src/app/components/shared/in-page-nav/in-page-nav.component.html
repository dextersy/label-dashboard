<div class="ipn-layout" [class.ipn-stack]="stackLayout">

  <div class="ipn-sidebar-wrap" [class.ipn-sidebar-wrap--fade-right]="showRightFade" [class.ipn-sidebar-wrap--fade-left]="showLeftFade">
    <span class="ipn-scroll-hint ipn-scroll-hint--left" *ngIf="showLeftFade">‹</span>
    <span class="ipn-scroll-hint ipn-scroll-hint--right" *ngIf="showRightFade">›</span>
  <nav class="ipn-sidebar" #sidebarEl (scroll)="onSidebarScroll()">
    <div class="ipn-items">
      <button
        *ngFor="let tab of tabs; trackBy: trackByTabId"
        type="button"
        class="ipn-item"
        [class.active]="activeTab === tab.id"
        [class.ipn-item--danger]="tab.color === 'danger'"
        [disabled]="tab.disabled"
        [matTooltip]="tab.tooltip || ''"
        (click)="onTabClick(tab)">
        <app-icon [name]="tab.icon" />
        <span>{{ tab.label }}</span>
        <app-icon name="check-circle" iconOnly class="status-icon status-completed" *ngIf="tab.status === 'completed'" />
        <app-icon name="warning" iconOnly class="status-icon status-warning" *ngIf="tab.status === 'warning'" />
        <app-icon name="warning" iconOnly class="status-icon status-error" *ngIf="tab.status === 'error'" />
      </button>
    </div>
  </nav>
  </div>

  <div class="ipn-main">
    <ng-content></ng-content>
  </div>

</div>
