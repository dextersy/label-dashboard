<div class="artist-selection-container">
  <button class="btn-secondary artist-dropdown-btn"
          type="button"
          (click)="openModal()"
          [disabled]="loading || isNewArtistMode">

    <!-- New Artist Mode -->
    <div class="artist-info" *ngIf="isNewArtistMode">
      <div class="artist-photo artist-initials artist-initials--new">+</div>
      <div class="artist-details">
        <div class="artist-name new-artist-name">New artist</div>
      </div>
    </div>

    <!-- Normal Mode -->
    <div class="artist-info" *ngIf="selectedArtist && !isNewArtistMode">
      <img *ngIf="hasProfilePhoto(selectedArtist)"
           [src]="getProfilePhotoUrl(selectedArtist)"
           class="artist-photo"
           [alt]="selectedArtist.name">
      <div *ngIf="!hasProfilePhoto(selectedArtist)"
           class="artist-photo artist-initials">{{ getArtistInitials(selectedArtist.name) }}</div>
      <div class="artist-details">
        <div class="artist-name">{{ selectedArtist.name }}</div>
      </div>
    </div>
    <div *ngIf="!selectedArtist && !loading && !isNewArtistMode" class="no-artist">
      Select an Artist
    </div>
    <div *ngIf="loading && !isNewArtistMode" class="loading-inline">
      <div class="loading-spinner"></div>Loading...
    </div>
    <span class="caret" *ngIf="!isNewArtistMode"></span>
  </button>
</div>

<!-- Artist Switch Modal -->
<div class="modal fade show" appModalToBody *ngIf="isModalOpen" tabindex="-1" style="display: block;" (click)="closeModal()">
  <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header tw-border-0 tw-px-4 tw-pt-4 tw-pb-2">
        <h5 class="modal-title artist-switch-modal-title">Switch Artist</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body tw-px-4 tw-pb-3 tw-pt-2">

        <!-- Search + Create New Artist -->
        <div class="artist-modal-search tw-mb-3">
          <div class="search-input-wrapper">
            <app-icon name="search" iconOnly class="search-icon" />
            <input type="text"
                   class="artist-search-input tw-input"
                   [(ngModel)]="searchTerm"
                   (input)="onSearchChange()"
                   placeholder="Search artists..."
                   autofocus>
          </div>
        </div>

        <!-- Artist list -->
        <div class="artist-modal-list">
          <button *ngIf="isAdmin" class="artist-modal-item create-artist-item" (click)="addNewArtist()">
            <app-icon name="plus" iconOnly class="artist-modal-plus" />
            <span class="artist-modal-name">Create new artist</span>
          </button>
          <button *ngFor="let artist of pagedArtists"
                  class="artist-modal-item"
                  [class.active]="selectedArtist?.id === artist.id"
                  (click)="selectArtist(artist, true)">
            <app-icon name="check" iconOnly class="artist-modal-check" *ngIf="selectedArtist?.id === artist.id" />
            <img *ngIf="hasProfilePhoto(artist)"
                 [src]="getProfilePhotoUrl(artist)"
                 class="artist-modal-photo"
                 [alt]="artist.name"
                 loading="lazy">
            <div *ngIf="!hasProfilePhoto(artist)"
                 class="artist-modal-photo artist-modal-initials">{{ getArtistInitials(artist.name) }}</div>
            <span class="artist-modal-name">{{ artist.name }}</span>
          </button>

          <!-- No results -->
          <div class="artist-modal-no-results" *ngIf="filteredArtists.length === 0">
            <app-icon name="search" class="tw-mr-2" />No artists found matching "{{ searchTerm }}"
          </div>
        </div>

        <!-- Pagination -->
        <div class="artist-modal-pagination" *ngIf="totalPages > 1">
          <button class="btn-sm btn-outline-secondary"
                  [disabled]="currentPage === 0"
                  (click)="prevPage()">
            <app-icon name="chevron-left" iconOnly />
          </button>
          <span class="pagination-info">{{ currentPage + 1 }} / {{ totalPages }}</span>
          <button class="btn-sm btn-outline-secondary"
                  [disabled]="currentPage === totalPages - 1"
                  (click)="nextPage()">
            <app-icon name="chevron-right" iconOnly />
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
<div class="modal-backdrop fade show" appModalToBody *ngIf="isModalOpen"></div>
