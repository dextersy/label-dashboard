<div class="modal" [class.show]="isVisible" [style.display]="isVisible ? 'block' : 'none'" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <!-- Body -->
      <div class="modal-body tw-pt-5 tw-text-center">
        <div class="celebration-icon tw-mb-1">
          <span role="img" aria-label="Celebration">🎊</span>
        </div>
        
        <h2 class="tw-mb-2 tw-font-bold">Your event is now live!</h2>
        
        <p class="tw-mb-4">
          Copy the link below and share it to start selling tickets.
        </p>

        <!-- Link Copy Box -->
        <div class="input-group link-action-group tw-mb-2">
          <input 
            type="text" 
            class="link-input tw-input" 
            [value]="data?.buyLink || ''" 
            readonly
            aria-label="Event ticket purchase link"
            #linkInput>
          <button
            class="btn-primary"
            type="button"
            (click)="copyLink()">
            <i class="fas" [ngClass]="copySuccess ? 'fa-check' : 'fa-copy'"></i>
            {{ copySuccess ? 'Copied!' : 'Copy' }}
          </button>
          <button
            class="btn-secondary"
            type="button"
            (click)="downloadBuyLinkQR()"
            title="Download QR Code">
            <i class="fas fa-qrcode"></i>
          </button>
        </div>
        
        <p class="small tw-mb-4 tw-text-muted tw-text-sm">
          (Link can also be found in the "Buy Page" tab)
        </p>

        <!-- Share Buttons -->
        <div class="tw-flex tw-gap-2 tw-justify-center tw-mb-4">
          <button 
            class="btn-lg"
            style="background-color: #1877f2; border-color: #1877f2; color: white;"
            (click)="shareOnFacebook()">
            <i class="fab fa-facebook tw-mr-2"></i>Share to Facebook
          </button>
          <button 
            class="btn-lg"
            style="background-color: #1da1f2; border-color: #1da1f2; color: white;"
            (click)="shareOnTwitter()">
            <i class="fab fa-twitter tw-mr-2"></i>Share to X
          </button>
        </div>

        <!-- Close Button -->
        <div class="tw-text-right tw-pb-3 tw-pr-3">
          <button type="button" class="btn-ghost tw-text-muted" (click)="close()">
            <i class="fas fa-times tw-mr-1"></i>Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Backdrop -->
<div class="modal-backdrop fade" [class.show]="isVisible" [style.display]="isVisible ? 'block' : 'none'"></div>
