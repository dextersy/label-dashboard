<div class="modal" [class.show]="isVisible" [style.display]="isVisible ? 'block' : 'none'" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-dialog-centered" role="document">
    <div class="modal-content">
      <!-- Body -->
      <div class="modal-body tw-pt-5 tw-text-center">
        <div class="celebration-icon tw-mb-1">
          <span role="img" aria-label="Celebration">🎊</span>
        </div>

        <h2 class="tw-mb-2 tw-font-bold">{{ data?.releaseTitle }} Submitted!</h2>

        <p class="tw-mb-4">
          {{ data?.message }}
        </p>

        <!-- Close Button -->
        <div class="tw-text-right tw-pb-3 tw-pr-3">
          <button type="button" class="btn-ghost tw-text-muted" (click)="close()">
            <i class="fas fa-times tw-mr-1"></i>Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Backdrop -->
<div class="modal-backdrop fade" [class.show]="isVisible" [style.display]="isVisible ? 'block' : 'none'"></div>
