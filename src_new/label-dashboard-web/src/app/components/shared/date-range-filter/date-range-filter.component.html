<!-- Date Range Filter Component -->
<div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-2 date-range-filter" [class.compact]="compact">
  <div class="sm:tw-px-card-pad tw-py-3" [class.tw-py-2]="compact">
    <!-- Collapsed Header - Always visible -->
    <div class="tw-items-center date-range-header tw-grid tw-grid-cols-1 md:tw-grid-cols-12">
      <div class="lg:tw-col-span-8 md:tw-col-span-8" [class.col-8]="compact">
        <div class="tw-flex tw-items-center">
          <button class="tw-inline-flex tw-items-center tw-gap-1.5 tw-px-2.5 tw-py-1 tw-rounded-md tw-text-sm tw-font-medium tw-text-gray-600 tw-bg-transparent tw-border-0 tw-cursor-pointer hover:tw-bg-gray-100 hover:tw-text-gray-800 tw-transition-colors tw-mr-2"
                  (click)="toggleExpanded()"
                  [title]="isExpanded ? 'Collapse date range options' : 'Expand date range options'">
            <app-icon name="calendar" iconOnly class="tw-text-gray-400" />
            <strong class="tw-font-semibold">{{ getPresetDisplayName() }}</strong>
            <app-icon [name]="isExpanded ? 'chevron-up' : 'chevron-down'" iconOnly class="tw-text-gray-400" />
          </button>
          <span class="tw-text-sm tw-text-gray-400 tw-mr-2" [ngClass]="{'tw-hidden': compact, 'sm:tw-inline': compact}">
            {{ formatDateForDisplay(startDate) }} – {{ formatDateForDisplay(endDate) }}
            <span class="tw-text-green-600 tw-ml-1" *ngIf="selectedPreset !== 'alltime'">({{ getDaysDifference() }} days)</span>
            <span class="tw-text-green-600 tw-ml-1" *ngIf="selectedPreset === 'alltime'">(All data)</span>
          </span>
          <button class="tw-inline-flex tw-items-center tw-gap-1.5 tw-px-2.5 tw-py-1 tw-rounded-md tw-text-sm tw-font-medium tw-text-gray-500 tw-bg-transparent tw-border-0 tw-cursor-pointer hover:tw-bg-gray-100 hover:tw-text-gray-700 tw-transition-colors disabled:tw-opacity-50 disabled:tw-cursor-not-allowed"
                  (click)="onRefresh()"
                  [disabled]="loading"
                  [title]="loading ? 'Refreshing data...' : 'Refresh data'">
            <app-icon name="refresh" iconOnly class="tw-text-gray-400" [class.fa-spin]="loading" />
            <span class="tw-hidden md:tw-inline">Refresh</span>
          </button>
        </div>
      </div>
      
      <!-- Header Actions -->
      <div class="lg:tw-col-span-4 md:tw-col-span-4" [class.col-4]="compact">
        <div class="tw-flex tw-justify-end tw-items-center">
          <div class="form-check form-switch tw-mr-3" *ngIf="showComparison && !compact">
            <input class="form-check-input" 
                   type="checkbox" 
                   id="compareSwitch"
                   [(ngModel)]="showComparisonToggle"
                   (change)="onComparisonToggle()">
            <label class="form-check-label" for="compareSwitch">
              <small>Compare</small>
            </label>
          </div>
          <div class="dropdown" *ngIf="showExport && !compact">
            <button class="btn-secondary btn-sm dropdown-toggle" 
                    type="button" 
                    data-bs-toggle="dropdown">
              <app-icon name="download" iconOnly />
              <span class="tw-ml-1 tw-hidden d-lg-inline">Export</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#" (click)="onExport('csv')">Export as CSV</a></li>
              <li><a class="dropdown-item" href="#" (click)="onExport('pdf')">Export as PDF</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Expanded Content - Show/hide based on isExpanded -->
    <div class="tw-items-center tw-mt-2 expanded-content tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-3" *ngIf="isExpanded">
      <!-- Date Range Presets -->
      <div class="tw-col-span-12">
        <div class="tw-flex tw-flex-wrap tw-items-center tw-gap-1.5 tw-mb-2">
          <span class="tw-text-sm tw-text-gray-400 tw-mr-1">Quick select:</span>
          <ng-container *ngFor="let preset of presetOptions">
            <button type="button"
                    class="preset-btn"
                    [class.preset-btn--active]="selectedPreset === preset.value"
                    (click)="applyDatePreset(preset.value)">
              {{ preset.label }}
            </button>
          </ng-container>
        </div>
        
        <!-- Custom Date Range -->
        <div class="tw-flex tw-flex-wrap tw-items-center">
          <span class="tw-mr-3 tw-mb-2 small tw-text-muted tw-text-sm">Custom Range:</span>
          <div class="input-group tw-mr-3 tw-mb-2 custom-date-inputs">
            <input type="date" 
                   class="tw-input-sm tw-input" 
                   [(ngModel)]="startDate"
                   (change)="onCustomDateChange()"
                   [max]="maxDate">
            <span class="input-group-text">to</span>
            <input type="date" 
                   class="tw-input-sm tw-input" 
                   [(ngModel)]="endDate"
                   (change)="onCustomDateChange()"
                   [min]="startDate"
                   [max]="maxDate">
          </div>
          
          <!-- Additional options for expanded view -->
          <div class="form-check form-switch tw-mr-3 tw-mb-2" *ngIf="showComparison && compact">
            <input class="form-check-input" 
                   type="checkbox" 
                   id="compareSwitchExpanded"
                   [(ngModel)]="showComparisonToggle"
                   (change)="onComparisonToggle()">
            <label class="form-check-label" for="compareSwitchExpanded">
              <small>Compare to previous period</small>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Last Updated Display - Only show when not loading and not expanded -->
    <div class="tw-mt-1 tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-3" *ngIf="!loading && !isExpanded && !compact">
      <div class="tw-col-span-12">
        <small class="tw-flex tw-justify-end tw-text-muted">
          Last updated: {{ lastUpdated | date:'medium' }}
        </small>
      </div>
    </div>
  </div>
</div>
