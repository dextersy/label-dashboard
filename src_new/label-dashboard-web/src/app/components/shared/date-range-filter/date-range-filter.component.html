<!-- Date Range Filter Component -->
<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8 date-range-filter" [class.compact]="compact">
  <div class="tw-px-card-pad tw-pb-card-pad" [class.tw-py-2]="compact">
    <!-- Collapsed Header - Always visible -->
    <div class="tw-items-center date-range-header tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
      <div class="lg:tw-col-span-8 md:tw-col-span-8" [class.col-8]="compact">
        <div class="tw-flex tw-items-center">
          <button class="btn-ghost btn-sm text-decoration-none tw-p-0 tw-mr-2"
                  (click)="toggleExpanded()"
                  [title]="isExpanded ? 'Collapse date range options' : 'Expand date range options'">
            <i class="fa fa-calendar tw-mr-1"></i>
            <strong>{{ getPresetDisplayName() }}</strong>
            <i class="fa tw-ml-1" [class.fa-chevron-down]="!isExpanded" [class.fa-chevron-up]="isExpanded"></i>
          </button>
          <span class="small tw-mr-2 tw-text-muted tw-text-sm" [ngClass]="{'tw-hidden': compact, 'sm:tw-inline': compact}">
            {{ formatDateForDisplay(startDate) }} - {{ formatDateForDisplay(endDate) }}
            <span class="tw-text-success tw-ml-1" *ngIf="selectedPreset !== 'alltime'">({{ getDaysDifference() }} days)</span>
            <span class="tw-text-success tw-ml-1" *ngIf="selectedPreset === 'alltime'">(All data)</span>
          </span>
          <button class="btn-ghost btn-sm"
                  (click)="onRefresh()"
                  [disabled]="loading"
                  [title]="loading ? 'Refreshing data...' : 'Refresh data'">
            <i class="fas fa-sync" [class.fa-spin]="loading"></i>
            <span class="tw-ml-1 tw-hidden md:tw-inline">Refresh</span>
          </button>
        </div>
      </div>
      
      <!-- Header Actions -->
      <div class="lg:tw-col-span-4 md:tw-col-span-4" [class.col-4]="compact">
        <div class="tw-flex tw-justify-end tw-items-center">
          <div class="form-check form-switch tw-mr-3" *ngIf="showComparison && !compact">
            <input class="form-check-input" 
                   type="checkbox" 
                   id="compareSwitch"
                   [(ngModel)]="showComparisonToggle"
                   (change)="onComparisonToggle()">
            <label class="form-check-label" for="compareSwitch">
              <small>Compare</small>
            </label>
          </div>
          <div class="dropdown" *ngIf="showExport && !compact">
            <button class="btn-secondary btn-sm dropdown-toggle" 
                    type="button" 
                    data-bs-toggle="dropdown">
              <i class="fa fa-download"></i>
              <span class="tw-ml-1 tw-hidden d-lg-inline">Export</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#" (click)="onExport('csv')">Export as CSV</a></li>
              <li><a class="dropdown-item" href="#" (click)="onExport('pdf')">Export as PDF</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Expanded Content - Show/hide based on isExpanded -->
    <div class="tw-items-center tw-mt-3 expanded-content tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="isExpanded">
      <!-- Date Range Presets -->
      <div class="tw-col-span-12">
        <div class="tw-flex tw-flex-wrap tw-items-center tw-mb-3">
          <span class="tw-mr-3 tw-mb-2 tw-text-muted" [class.small]="compact">Quick Select:</span>
          <div class="btn-group tw-mr-3 tw-mb-2" role="group">
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'today'"
                    [class.btn-secondary]="selectedPreset !== 'today'"
                    (click)="applyDatePreset('today')">
              Today
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'yesterday'"
                    [class.btn-secondary]="selectedPreset !== 'yesterday'"
                    (click)="applyDatePreset('yesterday')">
              Yesterday
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'last7days'"
                    [class.btn-secondary]="selectedPreset !== 'last7days'"
                    (click)="applyDatePreset('last7days')">
              Last 7 days
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'last30days'"
                    [class.btn-secondary]="selectedPreset !== 'last30days'"
                    (click)="applyDatePreset('last30days')">
              Last 30 days
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'thismonth'"
                    [class.btn-secondary]="selectedPreset !== 'thismonth'"
                    (click)="applyDatePreset('thismonth')">
              This month
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'lastmonth'"
                    [class.btn-secondary]="selectedPreset !== 'lastmonth'"
                    (click)="applyDatePreset('lastmonth')">
              Last month
            </button>
            <button type="button" 
                     
                    [class.btn-sm]="compact"
                    [class.btn-primary]="selectedPreset === 'alltime'"
                    [class.btn-secondary]="selectedPreset !== 'alltime'"
                    (click)="applyDatePreset('alltime')">
              All Time
            </button>
          </div>
        </div>
        
        <!-- Custom Date Range -->
        <div class="tw-flex tw-flex-wrap tw-items-center">
          <span class="tw-mr-3 tw-mb-2 small tw-text-muted tw-text-sm">Custom Range:</span>
          <div class="input-group tw-mr-3 tw-mb-2 custom-date-inputs">
            <input type="date" 
                   class="tw-input-sm tw-input" 
                   [(ngModel)]="startDate"
                   (change)="onCustomDateChange()"
                   [max]="maxDate">
            <span class="input-group-text">to</span>
            <input type="date" 
                   class="tw-input-sm tw-input" 
                   [(ngModel)]="endDate"
                   (change)="onCustomDateChange()"
                   [min]="startDate"
                   [max]="maxDate">
          </div>
          
          <!-- Additional options for expanded view -->
          <div class="form-check form-switch tw-mr-3 tw-mb-2" *ngIf="showComparison && compact">
            <input class="form-check-input" 
                   type="checkbox" 
                   id="compareSwitchExpanded"
                   [(ngModel)]="showComparisonToggle"
                   (change)="onComparisonToggle()">
            <label class="form-check-label" for="compareSwitchExpanded">
              <small>Compare to previous period</small>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Last Updated Display - Only show when not loading and not expanded -->
    <div class="tw-mt-2 tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="!loading && !isExpanded && !compact">
      <div class="tw-col-span-12">
        <small class="tw-flex tw-justify-end tw-text-muted">
          Last updated: {{ lastUpdated | date:'medium' }}
        </small>
      </div>
    </div>
  </div>
</div>
