<div class="login-wrapper fadeInDown">
  <!-- Form Header with Brand Logo -->
  <div id="formHeader" [style.background-color]="brandColor">
    <div class="fadeIn first">
      <img [src]="brandLogo" id="icon" [alt]="brandName" />
    </div>
  </div>

  <!-- Form Content -->
  <div id="formContent">
    <!-- Alert -->
    <div class="tw-px-4 tw-py-3 tw-mb-4 tw-border tw-border-red-200 tw-rounded-lg tw-bg-red-50 tw-text-red-800 tw-text-sm tw-leading-normal" role="alert" *ngIf="messageType === 'error'">
      {{ message }}
    </div>
    
    <div *ngIf="messageType === 'success'">
      <h5><strong>Request Received! 💌</strong></h5>
      <p>{{ message }}</p>
      <p class="tw-text-muted"><small>You may now close this window.</small></p>
    </div>
    
    <div *ngIf="messageType !== 'success'">
      <h4><strong>Forgot your password? 🔑</strong></h4>
      <h6 class="tw-text-muted"><strong>Don't worry, we'll fix this for you!</strong></h6>
      &nbsp;
      <small class="tw-text-muted">Please input the email address associated with your account so we can send you a link to reset your password.</small>
      
      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" novalidate>
        <input 
          type="email" 
          id="email" 
          class="fadeIn second" 
          name="email" 
          placeholder="Email address" 
          [(ngModel)]="email"
          [disabled]="loading"
          required
        >
        <input
          type="submit"
          class="fadeIn fourth btn-primary tw-w-full"
          style="margin-top:10px;"
          [value]="loading ? 'Sending...' : 'Send Password Reset Link'"
          [disabled]="loading || !email"
        >
      </form>
    </div>
  </div>

  <!-- Form Footer -->
  <div id="formFooter">
    <a class="" (click)="goToLogin()">Back to login</a>
  </div>
</div>
