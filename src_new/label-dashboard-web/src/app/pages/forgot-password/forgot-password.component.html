<div class="tw-min-h-screen tw-bg-gray-50 tw-flex tw-items-center tw-justify-center tw-px-4 tw-py-12">
  <div class="tw-w-full tw-max-w-sm">

    <!-- Brand header -->
    <div class="tw-flex tw-flex-col tw-items-center tw-mb-8">
      <div
        class="tw-w-20 tw-h-20 tw-rounded-2xl tw-flex tw-items-center tw-justify-center tw-mb-4 tw-overflow-hidden tw-shadow-md"
        [style.background-color]="brandColor">
        <img [src]="brandLogo" [alt]="brandName" class="tw-max-w-full tw-max-h-full tw-object-contain tw-p-2">
      </div>
      <h1 class="tw-text-xl tw-font-bold tw-text-gray-900">{{ brandName }}</h1>
    </div>

    <!-- Card -->
    <div class="tw-bg-white tw-rounded-2xl tw-shadow-lg tw-p-8">

      <!-- Success state -->
      <div *ngIf="messageType === 'success'" class="tw-text-center">
        <div class="tw-w-16 tw-h-16 tw-rounded-full tw-bg-green-100 tw-flex tw-items-center tw-justify-center tw-mx-auto tw-mb-4">
          <i class="fas fa-check tw-text-2xl tw-text-green-600"></i>
        </div>
        <h2 class="tw-text-lg tw-font-bold tw-text-gray-900 tw-mb-2">Request Received!</h2>
        <p class="tw-text-sm tw-text-gray-600 tw-mb-1">{{ message }}</p>
        <p class="tw-text-xs tw-text-gray-400">You may now close this window.</p>
      </div>

      <!-- Form state -->
      <div *ngIf="messageType !== 'success'">
        <h2 class="tw-text-lg tw-font-bold tw-text-gray-900 tw-mb-1">Forgot your password?</h2>
        <p class="tw-text-sm tw-text-gray-500 tw-mb-6">Enter your email and we'll send you a reset link.</p>

        <div *ngIf="messageType === 'error'"
          class="tw-flex tw-items-start tw-gap-2 tw-px-4 tw-py-3 tw-mb-5 tw-rounded-lg tw-bg-red-50 tw-border tw-border-red-200 tw-text-red-800 tw-text-sm"
          role="alert">
          <i class="fas fa-exclamation-circle tw-mt-0.5 tw-shrink-0"></i>
          <span>{{ message }}</span>
        </div>

        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" novalidate>
          <div class="tw-space-y-5">
            <div>
              <label for="email" class="tw-label">Email address</label>
              <input
                type="email"
                id="email"
                class="tw-input"
                name="email"
                placeholder="you@example.com"
                [(ngModel)]="email"
                [disabled]="loading"
                autocomplete="email"
                required>
            </div>

            <button
              type="submit"
              class="tw-w-full tw-py-2.5 tw-px-4 tw-rounded-lg tw-text-white tw-font-semibold tw-text-sm tw-transition-opacity disabled:tw-opacity-60 disabled:tw-cursor-not-allowed tw-flex tw-items-center tw-justify-center tw-gap-2"
              [style.background-color]="brandColor"
              [disabled]="loading || !email">
              <svg *ngIf="loading" class="tw-animate-spin tw-h-4 tw-w-4 tw-text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="tw-opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="tw-opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              {{ loading ? 'Sending...' : 'Send Reset Link' }}
            </button>
          </div>
        </form>
      </div>

    </div>

    <!-- Back link -->
    <p class="tw-text-center tw-text-sm tw-text-gray-500 tw-mt-6">
      <a (click)="goToLogin()" class="tw-font-medium tw-cursor-pointer hover:tw-underline" [style.color]="brandColor">
        ← Back to login
      </a>
    </p>

  </div>
</div>
