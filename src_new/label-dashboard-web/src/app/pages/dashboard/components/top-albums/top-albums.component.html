<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3>Top earning releases (all-time)</h3>
  </div>
  <div class="tw-px-card-pad tw-pb-card-pad chart-body">
    <div *ngIf="releases.length === 0" class="tw-py-3 tw-text-center tw-text-muted">
      No earnings data found
    </div>
    <canvas #earningsChart *ngIf="releases.length > 0"></canvas>
  </div>
  <div class="tw-px-card-pad tw-py-4 tw-border-t tw-border-border-subtle text-right">
    <a (click)="goToFinancial()" class="btn-ghost" style="cursor: pointer;">
      Go to release earnings <i class="far fa-arrow-alt-circle-right"></i>
    </a>
  </div>
</div>
