<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-h-full tw-flex tw-flex-col">
  <div class="tw-p-6 tw-border-b tw-border-gray-100 tw-flex tw-items-center tw-justify-between">
    <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-0">Release Pipeline</h3>
    <span *ngIf="total > 0" class="tw-text-xs tw-font-semibold tw-text-gray-500 tw-bg-gray-100 tw-px-2.5 tw-py-0.5 tw-rounded-full">{{ total }} total</span>
  </div>

  <div class="tw-p-6 tw-flex-1">
    <!-- Empty state -->
    <div *ngIf="total === 0" class="tw-py-4 tw-text-center tw-text-muted">
      <app-icon name="layers" [size]="32" class="tw-mb-2 tw-block" />
      No releases yet
    </div>

    <ng-container *ngIf="total > 0">
      <!-- Flow stages -->
      <div class="flow-row">
        <ng-container *ngFor="let stage of flowStages; let i = index; let last = last">
          <div class="stage-card" [class]="'stage-' + getStatusKey(stage.status)" [class.stage-empty]="stage.count === 0">
            <div class="stage-icon-wrap"><app-icon [name]="getIcon(stage.status)" /></div>
            <div class="stage-count">{{ stage.count }}</div>
            <div class="stage-name">{{ stage.status }}</div>
            <div class="stage-pct" *ngIf="stage.count > 0">{{ getPct(stage.count) }}%</div>
            <div class="stage-fill-bar">
              <div class="stage-fill-inner" [style.width.%]="getPct(stage.count)"></div>
            </div>
          </div>
          <div class="flow-arrow" *ngIf="!last"><app-icon name="chevron-right" /></div>
        </ng-container>
      </div>

      <!-- Taken Down exit row -->
      <div class="taken-down-row" *ngIf="takenDown.count > 0">
        <div class="taken-down-line"></div>
        <div class="taken-down-card">
          <app-icon name="ban" />
          <span class="taken-down-count">{{ takenDown.count }}</span>
          <span class="taken-down-label">Taken Down</span>
          <span class="taken-down-pct">{{ getPct(takenDown.count) }}%</span>
        </div>
      </div>

      <!-- Distribution bar -->
      <div class="distribution-bar tw-mt-3">
        <div *ngFor="let stage of distributionStages"
             class="distribution-segment"
             [class]="'segment-' + getStatusKey(stage.status)"
             [style.flex]="stage.count"
             [title]="stage.status + ': ' + stage.count + ' (' + getPct(stage.count) + '%)'">
        </div>
      </div>
      <div class="distribution-legend">
        <div class="legend-item" *ngFor="let stage of distributionStages">
          <span class="legend-dot" [class]="'dot-' + getStatusKey(stage.status)"></span>
          <span class="legend-label">{{ stage.status }}</span>
        </div>
      </div>
    </ng-container>
  </div>

  <div class="tw-px-6 tw-py-4 tw-border-t tw-border-gray-100 tw-text-right">
    <a (click)="goToReleases()" class="btn-ghost" style="cursor: pointer;">
      Go to releases <app-icon name="arrow-right" />
    </a>
  </div>
</div>
