<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3>Fundraiser Analytics</h3>
  </div>
  <div class="tw-px-card-pad tw-pb-card-pad">
    <div *ngIf="fundraiserDonations.length === 0" class="tw-py-4 tw-text-center tw-text-muted">
      <i class="fas fa-hand-holding-heart fa-3x tw-mb-3"></i>
      <p>No fundraiser data found</p>
    </div>

    <div *ngIf="fundraiserDonations.length > 0">
      <!-- Charts Section -->
      <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
        <div class="md:tw-col-span-6">
          <div class="chart-container" style="position: relative; height: 300px;">
            <canvas #donationsChart></canvas>
          </div>
        </div>
        <div class="md:tw-col-span-6">
          <div class="chart-container" style="position: relative; height: 300px;">
            <canvas #progressChart></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
