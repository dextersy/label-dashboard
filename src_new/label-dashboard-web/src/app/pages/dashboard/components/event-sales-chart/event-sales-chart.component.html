<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3>Event Sales Analytics</h3>
  </div>
  <div class="tw-px-card-pad tw-pb-card-pad">
    <div *ngIf="eventSales.length === 0" class="tw-py-4 tw-text-center tw-text-muted">
      <i class="fas fa-chart-bar fa-3x tw-mb-3"></i>
      <p>No event sales data found</p>
    </div>
    
    <div *ngIf="eventSales.length > 0">
      <!-- Charts Section -->
      <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
        <div class="md:tw-col-span-6">
          <div class="chart-container" style="position: relative; height: 300px;">
            <canvas #salesChart></canvas>
          </div>
        </div>
        <div class="md:tw-col-span-6">
          <div class="chart-container" style="position: relative; height: 300px;">
            <canvas #ticketsChart></canvas>
          </div>
        </div>
      </div>
      
      <!-- Event Details Section -->
    </div>
  </div>
</div>
