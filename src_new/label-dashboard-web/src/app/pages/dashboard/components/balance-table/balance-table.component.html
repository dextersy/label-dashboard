<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3>Balance Summary</h3>
  </div>
  <div class="tw-px-card-pad tw-pb-card-pad">
    <div class="-cols-2 -cols-md-1 g-md-0 artist-balance-grid tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
      <div class="col" *ngFor="let artist of artists">
        <div class="artist-balance-item">
          <div class="artist-info">
            <img [src]="getProfilePhotoUrl(artist.profile_photo)"
                 [alt]="artist.name + ' photo'"
                 class="artist-photo">
            <span class="artist-name">{{ artist.name }}</span>
          </div>
          <div class="balance-amount" [ngClass]="getBalanceClass(artist.balance)">
            {{ formatCurrency(artist.balance) }}
          </div>
        </div>
      </div>
      <div class="tw-col-span-12" *ngIf="artists.length === 0">
        <p class="tw-py-2 tw-text-center tw-text-muted">No artists found</p>
      </div>
    </div>
  </div>
  <div class="tw-px-card-pad tw-py-4 tw-border-t tw-border-border-subtle text-right">
    <a (click)="goToFinancial()" class="btn-ghost" style="cursor: pointer;">
      Go to financial overview <i class="far fa-arrow-alt-circle-right"></i>
    </a>
  </div>
</div>
