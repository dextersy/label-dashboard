<div class="events-page">
  <app-breadcrumb></app-breadcrumb>
  <div class="container-fluid">

    <!-- Page Header with Event Selector -->
    <div class="page-header mb-3 tw-mb-3">
      <div class="d-flex align-items-start flex-wrap gap-3 tw-flex tw-items-start tw-flex-wrap tw-gap-3">
        <div class="event-selector-main" *ngIf="availableEvents.length > 0">
          <app-event-selection
            [events]="availableEvents"
            [selectedEvent]="selectedEvent"
            [loading]="loading"
            [isAdmin]="isAdmin"
            (eventSelected)="onEventSelection($event)">
          </app-event-selection>
        </div>
      </div>
    </div>

    <!-- Past Event Warning -->
    <div class="alert alert-warning mb-3 tw-mb-3" *ngIf="selectedEvent && isEventPast(selectedEvent)">
      <i class="fas fa-exclamation-triangle me-2 tw-mr-2"></i>
      <strong>This event occurred in the past.</strong> You can make limited changes to tickets and referrals.
    </div>

    <!-- Main Content -->
    <div class="row tw-grid tw-grid-cols-1" *ngIf="selectedEvent">
      <div class="col-12 tw-col-span-12">
        
        <!-- Event Tickets Tab -->
        <div *ngIf="activeTab === 'tickets'">
          <app-event-tickets-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-tickets-tab>
        </div>
        
        <!-- Abandoned Orders Tab -->
        <div *ngIf="activeTab === 'abandoned'">
          <app-event-abandoned-orders-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-abandoned-orders-tab>
        </div>
        
        <!-- Referrals Tab -->
        <div *ngIf="activeTab === 'referrals'">
          <app-event-referrals-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-referrals-tab>
        </div>
        
        <!-- Email Tab -->
        <div *ngIf="activeTab === 'email'">
          <app-event-email-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-email-tab>
        </div>
        
      </div>
    </div>
    
    <!-- Loading Events -->
    <div class="row tw-grid tw-grid-cols-1" *ngIf="loading && availableEvents.length === 0">
      <div class="col-12 tw-col-span-12">
        <div class="card">
          <div class="card-body text-center p-5 tw-text-center">
            <div class="loading-dots">
              <div></div>
              <div></div>
              <div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- No Events Available -->
    <div class="row tw-grid tw-grid-cols-1" *ngIf="!loading && availableEvents.length === 0">
      <div class="col-12 tw-col-span-12">
        <div class="card">
          <div class="card-body text-center p-5 tw-text-center">
            <i class="fas fa-ticket-alt fa-4x text-muted mb-3 tw-text-muted tw-mb-3"></i>
            <h4>No Events Available</h4>
            <p class="text-muted tw-text-muted">No events found for your label. Create a new event to get started.</p>
            <button class="btn btn-primary" *ngIf="isAdmin" (click)="openCreateEventModal()">
              <i class="fa fa-plus me-1 tw-mr-1"></i>Create New Event
            </button>
          </div>
        </div>
      </div>
    </div>
    
  </div>
</div>
