<div class="events-page">
  <app-breadcrumb></app-breadcrumb>
  <div class="container-fluid">

    <!-- Page Header with Event Selector -->
    <div class="page-header tw-mb-3">
      <div class="tw-flex tw-items-start tw-flex-wrap tw-gap-3">
        <div class="event-selector-main" *ngIf="availableEvents.length > 0">
          <app-event-selection
            [events]="availableEvents"
            [selectedEvent]="selectedEvent"
            [loading]="loading"
            [isAdmin]="isAdmin"
            (eventSelected)="onEventSelection($event)">
          </app-event-selection>
        </div>
      </div>
    </div>

    <!-- Past Event Warning -->
    <div class="tw-px-4 tw-py-3 tw-mb-4 tw-border tw-rounded-lg tw-text-sm tw-leading-normal tw-border-amber-200 tw-bg-amber-50 tw-text-amber-800 tw-mb-3" *ngIf="selectedEvent && isEventPast(selectedEvent)">
      <app-icon name="warning" class="tw-mr-2" />
      <strong>This event occurred in the past.</strong> You can make limited changes to tickets and referrals.
    </div>

    <!-- Main Content -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="selectedEvent">
      <div class="tw-col-span-12">
        
        <!-- Event Tickets Tab -->
        <div *ngIf="activeTab === 'tickets'">
          <app-event-tickets-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-tickets-tab>
        </div>
        
        <!-- Abandoned Orders Tab -->
        <div *ngIf="activeTab === 'abandoned'">
          <app-event-abandoned-orders-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-abandoned-orders-tab>
        </div>
        
        <!-- Referrals Tab -->
        <div *ngIf="activeTab === 'referrals'">
          <app-event-referrals-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-referrals-tab>
        </div>
        
        <!-- Email Tab -->
        <div *ngIf="activeTab === 'email'">
          <app-event-email-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)">
          </app-event-email-tab>
        </div>

        <!-- Listing Tab -->
        <div *ngIf="activeTab === 'listing'">
          <app-event-listing-tab
            [selectedEvent]="selectedEvent"
            [isAdmin]="isAdmin"
            (alertMessage)="onAlertMessage($event)"
            (eventUpdated)="onEventUpdated($event)">
          </app-event-listing-tab>
        </div>
        
      </div>
    </div>
    
    <!-- Loading Events -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="loading && availableEvents.length === 0">
      <div class="tw-col-span-12">
        <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pb-card-pad tw-p-5 tw-text-center">
            <div class="loading-dots">
              <div></div>
              <div></div>
              <div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- No Events Available -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="!loading && availableEvents.length === 0">
      <div class="tw-col-span-12">
        <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pb-card-pad tw-p-5 tw-text-center">
            <app-icon name="ticket" class="fa-4x tw-mb-3 tw-text-muted" iconOnly />
            <h4>No Events Available</h4>
            <p class="tw-text-muted">No events found for your label. Create a new event to get started.</p>
            <button class="btn-primary" *ngIf="isAdmin" (click)="openCreateEventModal()">
              <app-icon name="plus" class="tw-mr-1" />Create New Event
            </button>
          </div>
        </div>
      </div>
    </div>
    
  </div>
</div>
