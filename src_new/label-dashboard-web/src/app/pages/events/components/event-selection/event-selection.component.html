<div class="event-selection-container">
  <div class="dropdown" [class.open]="isDropdownOpen">
    <button class="event-dropdown-btn" type="button" (click)="toggleDropdown()" [disabled]="loading">

      <!-- Selected event -->
      <div class="tw-flex tw-items-center tw-flex-1 tw-min-w-0" *ngIf="selectedEvent">
        <!-- Poster -->
        <div class="tw-flex-shrink-0 tw-mr-3">
          <img *ngIf="hasValidImage(selectedEvent); else defaultPoster"
               [src]="selectedEvent.poster_url"
               class="tw-w-12 tw-h-12 tw-rounded-md tw-object-cover tw-border tw-border-gray-200"
               [alt]="selectedEvent.title"
               (error)="onImageError($event, selectedEvent.id)">
          <ng-template #defaultPoster>
            <div class="tw-w-12 tw-h-12 tw-rounded-md tw-flex tw-items-center tw-justify-center tw-text-white tw-text-xl tw-border tw-border-gray-200"
                 style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
              <i class="fa fa-calendar-alt"></i>
            </div>
          </ng-template>
        </div>
        <!-- Details -->
        <div class="tw-flex-1 tw-min-w-0">
          <div class="tw-font-semibold tw-text-base tw-text-gray-800 tw-truncate tw-mb-0.5">{{ selectedEvent.title }}</div>
          <div class="tw-flex tw-items-center tw-gap-3 tw-mb-1 tw-flex-wrap">
            <span class="tw-flex tw-items-center tw-gap-1 tw-text-sm tw-text-gray-500">
              <i class="fa fa-clock tw-text-gray-400"></i>
              {{ selectedEvent.date_and_time | date:'MMM d, y • h:mm a' }}
            </span>
            <span class="tw-flex tw-items-center tw-gap-1 tw-text-sm tw-text-gray-500">
              <i class="fas fa-map-marker-alt tw-text-gray-400"></i>
              {{ selectedEvent.venue }}
            </span>
          </div>
          <span class="badge" [class]="getEventStatusClass(selectedEvent)">{{ getEventStatusText(selectedEvent) }}</span>
        </div>
      </div>

      <!-- Placeholder -->
      <div *ngIf="!selectedEvent && !loading" class="tw-flex tw-items-center tw-gap-2 tw-text-gray-400 tw-text-sm">
        <i class="fa fa-calendar-plus"></i>
        Select an Event
      </div>

      <!-- Loading -->
      <div *ngIf="loading" class="tw-flex tw-items-center tw-gap-2 tw-text-gray-400 tw-text-sm">
        <div class="loading-spinner"></div>Loading events...
      </div>

      <span class="caret"></span>
    </button>

    <ul class="dropdown-menu" *ngIf="isDropdownOpen">
      <!-- Mobile header -->
      <li class="mobile-dropdown-header">
        <span class="tw-text-lg tw-font-semibold tw-text-gray-800">Select Event</span>
        <button type="button" class="tw-w-10 tw-h-10 tw-rounded-full tw-bg-gray-100 tw-border-0 tw-flex tw-items-center tw-justify-center tw-cursor-pointer hover:tw-bg-gray-200"
                (click)="toggleDropdown(); $event.stopPropagation()">
          <i class="fa fa-times tw-text-gray-500"></i>
        </button>
      </li>

      <!-- Search -->
      <li class="tw-px-3 tw-py-2 tw-border-b tw-border-gray-100" *ngIf="events.length > 5">
        <div class="tw-relative tw-flex tw-items-center">
          <i class="fa fa-search tw-absolute tw-left-3 tw-text-gray-400 tw-z-10"></i>
          <input
            type="text"
            class="tw-input tw-pl-8 tw-pr-8 tw-rounded-full tw-text-sm tw-h-9 tw-w-full"
            placeholder="Search events..."
            [(ngModel)]="searchTerm"
            (click)="$event.stopPropagation()"
            #searchInput>
          <button
            class="tw-absolute tw-right-2 tw-border-0 tw-bg-transparent tw-text-gray-400 hover:tw-text-gray-600 tw-cursor-pointer"
            *ngIf="searchTerm"
            (click)="clearSearch(); $event.stopPropagation()">
            <i class="fa fa-times tw-text-xs"></i>
          </button>
        </div>
      </li>

      <li class="tw-h-px tw-bg-gray-100 tw-my-1" *ngIf="events.length > 5"></li>

      <!-- Create new event -->
      <li *ngIf="isAdmin" class="tw-border-t tw-border-gray-100 tw-mt-1 tw-pt-1">
        <a (click)="createEvent()" class="tw-flex tw-items-center tw-gap-2 tw-px-4 tw-py-2 tw-text-sm tw-font-semibold tw-cursor-pointer hover:tw-bg-gray-50 tw-no-underline" style="color: var(--brand-color, #3b82f6)">
          <i class="fa fa-plus" style="color: var(--brand-color, #3b82f6)"></i>
          Create New Event
        </a>
      </li>

      <li class="tw-h-px tw-bg-gray-100 tw-my-1" *ngIf="isAdmin && events.length > 0"></li>

      <!-- Event items -->
      <li *ngFor="let event of filteredEvents"
          [class.active]="selectedEvent?.id === event.id"
          class="event-item">
        <a (click)="selectEvent(event)" class="tw-flex tw-items-center tw-gap-3 tw-px-4 tw-py-3 tw-cursor-pointer tw-no-underline tw-text-gray-800">
          <!-- Poster -->
          <div class="tw-flex-shrink-0">
            <img *ngIf="hasValidImage(event); else dropdownDefaultPoster"
                 [src]="event.poster_url"
                 class="tw-w-10 tw-h-10 tw-rounded tw-object-cover tw-border tw-border-gray-200"
                 [alt]="event.title"
                 (error)="onDropdownImageError($event, event.id)">
            <ng-template #dropdownDefaultPoster>
              <div class="tw-w-10 tw-h-10 tw-rounded tw-flex tw-items-center tw-justify-center tw-text-white tw-border tw-border-gray-200"
                   style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)">
                <i class="fa fa-calendar-alt tw-text-sm"></i>
              </div>
            </ng-template>
          </div>
          <!-- Info -->
          <div class="tw-flex-1 tw-min-w-0">
            <div class="tw-font-semibold tw-text-base tw-truncate tw-mb-0.5">{{ event.title }}</div>
            <div class="tw-flex tw-flex-col tw-gap-0.5 tw-mb-1">
              <span class="tw-flex tw-items-center tw-gap-1 tw-text-sm tw-text-gray-500">
                <i class="fa fa-clock tw-text-gray-400"></i>
                {{ event.date_and_time | date:'MMM d, y • h:mm a' }}
              </span>
              <span class="tw-flex tw-items-center tw-gap-1 tw-text-sm tw-text-gray-500">
                <i class="fas fa-map-marker-alt tw-text-gray-400"></i>
                {{ event.venue }}
              </span>
            </div>
            <span class="badge badge-sm" [class]="getEventStatusClass(event)">{{ getEventStatusText(event) }}</span>
          </div>
        </a>
      </li>

      <!-- No results -->
      <li *ngIf="filteredEvents.length === 0 && searchTerm" class="tw-py-5 tw-text-center tw-text-sm tw-text-gray-400">
        <i class="fa fa-search tw-mr-2"></i>
        No events found matching "{{ searchTerm }}"
      </li>
    </ul>
  </div>

  <!-- Search summary -->
  <div class="tw-mt-1.5" *ngIf="searchTerm && filteredEvents.length > 0">
    <small class="tw-text-gray-500">
      <i class="fa fa-filter tw-mr-1" style="color: var(--brand-color, #3b82f6)"></i>
      Showing {{ filteredEvents.length }} of {{ events.length }} events
    </small>
  </div>
</div>
