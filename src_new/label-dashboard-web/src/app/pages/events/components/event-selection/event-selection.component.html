<div class="event-selection-container">
  <div class="dropdown" [class.open]="isDropdownOpen">

    <!-- Switcher trigger -->
    <button class="event-switcher"
            type="button"
            (click)="toggleDropdown()"
            [disabled]="loading">

      <!-- Icon dot -->
      <div class="event-icon-dot">
        <img *ngIf="selectedEvent && hasValidImage(selectedEvent)"
             [src]="selectedEvent.poster_url"
             (error)="onImageError($event, selectedEvent!.id)"
             alt=""
             class="event-icon-poster">
        <i class="fa fa-music" *ngIf="!selectedEvent || !hasValidImage(selectedEvent)"></i>
      </div>

      <!-- Selected event info -->
      <div class="switcher-info" *ngIf="selectedEvent">
        <div class="switcher-title">{{ selectedEvent.title }}</div>
        <div class="switcher-meta">{{ selectedEvent.date_and_time | date:'MMM d, y · h:mm a' }} · {{ selectedEvent.venue }}</div>
      </div>

      <!-- Placeholder -->
      <div class="tw-flex tw-items-center tw-gap-2 tw-text-gray-400 tw-text-sm tw-flex-1 tw-min-w-0" *ngIf="!selectedEvent && !loading">
        <i class="fa fa-calendar-plus"></i>
        Select an Event
      </div>

      <!-- Loading -->
      <div class="tw-flex tw-items-center tw-gap-2 tw-text-gray-400 tw-text-sm tw-flex-1 tw-min-w-0" *ngIf="loading">
        <div class="loading-spinner"></div>Loading events...
      </div>

      <!-- Right side: status + chevron -->
      <div class="switcher-right" *ngIf="selectedEvent">
        <span class="event-status-pill" [ngClass]="getEventStatusClass(selectedEvent)">
          <span class="status-dot"></span>{{ getEventStatusText(selectedEvent) }}
        </span>
        <svg class="switcher-chevron" [class.rotated]="isDropdownOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </button>

    <!-- Dropdown panel -->
    <ul class="dropdown-menu" *ngIf="isDropdownOpen">

      <!-- Mobile header -->
      <li class="mobile-dropdown-header">
        <span class="tw-text-base tw-font-semibold tw-text-gray-800">Switch event</span>
        <button type="button"
                class="tw-w-9 tw-h-9 tw-rounded-full tw-bg-gray-100 tw-border-0 tw-flex tw-items-center tw-justify-center tw-cursor-pointer hover:tw-bg-gray-200"
                (click)="toggleDropdown(); $event.stopPropagation()">
          <i class="fa fa-times tw-text-gray-500"></i>
        </button>
      </li>

      <!-- Search (5+ events) -->
      <li class="tw-px-3 tw-py-2 tw-border-b tw-border-gray-100" *ngIf="events.length > 5">
        <div class="tw-relative tw-flex tw-items-center">
          <i class="fa fa-search tw-absolute tw-left-3 tw-text-gray-400 tw-z-10"></i>
          <input
            type="text"
            class="tw-input tw-pl-8 tw-pr-8 tw-rounded-full tw-text-sm tw-h-9 tw-w-full"
            placeholder="Search events..."
            [(ngModel)]="searchTerm"
            (click)="$event.stopPropagation()"
            #searchInput>
          <button
            class="tw-absolute tw-right-2 tw-border-0 tw-bg-transparent tw-text-gray-400 hover:tw-text-gray-600 tw-cursor-pointer"
            *ngIf="searchTerm"
            (click)="clearSearch(); $event.stopPropagation()">
            <i class="fa fa-times tw-text-xs"></i>
          </button>
        </div>
      </li>

      <!-- Create new event -->
      <li *ngIf="isAdmin" class="dropdown-create-item">
        <a (click)="createEvent()" class="tw-flex tw-items-center tw-gap-2 tw-px-4 tw-py-2.5 tw-text-sm tw-font-semibold tw-cursor-pointer hover:tw-bg-gray-50 tw-no-underline" style="color: var(--brand-color, #3b82f6)">
          <i class="fa fa-plus" style="color: var(--brand-color, #3b82f6)"></i>
          Create New Event
        </a>
      </li>

      <li class="tw-h-px tw-bg-gray-100" *ngIf="isAdmin && events.length > 0"></li>

      <!-- Event items -->
      <li *ngFor="let event of filteredEvents; let i = index"
          [class.selected]="selectedEvent?.id === event.id"
          class="dropdown-event-item">
        <a (click)="selectEvent(event)" class="dropdown-event-link">
          <!-- Dot icon -->
          <div class="di-dot" [ngStyle]="hasValidImage(event) ? {} : getEventDotStyle(i)">
            <img *ngIf="hasValidImage(event)"
                 [src]="event.poster_url"
                 (error)="onDropdownImageError($event, event.id)"
                 alt=""
                 class="di-poster">
            <i class="fa fa-music" *ngIf="!hasValidImage(event)"></i>
          </div>
          <!-- Info -->
          <div class="di-info">
            <div class="di-title">{{ event.title }}</div>
            <div class="di-date">{{ event.date_and_time | date:'MMM d, y' }}</div>
          </div>
          <!-- Status -->
          <span class="event-status-pill event-status-pill--sm" [ngClass]="getEventStatusClass(event)">{{ getEventStatusText(event) }}</span>
          <!-- Selected checkmark -->
          <svg *ngIf="selectedEvent?.id === event.id" class="di-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </a>
      </li>

      <!-- No results -->
      <li *ngIf="filteredEvents.length === 0 && searchTerm" class="tw-py-5 tw-text-center tw-text-sm tw-text-gray-400">
        <i class="fa fa-search tw-mr-2"></i>
        No events found matching "{{ searchTerm }}"
      </li>
    </ul>
  </div>

  <!-- Search summary -->
  <div class="tw-mt-1.5" *ngIf="searchTerm && filteredEvents.length > 0">
    <small class="tw-text-gray-500">
      <i class="fa fa-filter tw-mr-1" style="color: var(--brand-color, #3b82f6)"></i>
      Showing {{ filteredEvents.length }} of {{ events.length }} events
    </small>
  </div>
</div>
