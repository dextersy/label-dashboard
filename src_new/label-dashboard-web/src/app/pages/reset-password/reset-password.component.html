<div class="tw-min-h-screen tw-bg-gray-50 tw-flex tw-items-center tw-justify-center tw-px-4 tw-py-12">
  <div class="tw-w-full tw-max-w-sm">

    <!-- Brand header -->
    <div class="tw-flex tw-flex-col tw-items-center tw-mb-8">
      <div
        class="tw-w-20 tw-h-20 tw-rounded-2xl tw-flex tw-items-center tw-justify-center tw-mb-4 tw-overflow-hidden tw-shadow-md"
        [style.background-color]="brandColor">
        <img [src]="brandLogo" [alt]="brandName" class="tw-max-w-full tw-max-h-full tw-object-contain tw-p-2">
      </div>
      <h1 class="tw-text-xl tw-font-bold tw-text-gray-900">{{ brandName }}</h1>
    </div>

    <!-- Card -->
    <div class="tw-bg-white tw-rounded-2xl tw-shadow-lg tw-p-8">

      <!-- Error: invalid/expired link -->
      <div *ngIf="error"
        class="tw-flex tw-items-start tw-gap-2 tw-px-4 tw-py-3 tw-mb-5 tw-rounded-lg tw-bg-red-50 tw-border tw-border-red-200 tw-text-red-800 tw-text-sm"
        role="alert">
        <app-icon name="warning" class="tw-mt-0.5 tw-shrink-0" />
        <span>{{ errorMessage }} <a (click)="goToLogin()" class="tw-underline tw-cursor-pointer">Please try again.</a></span>
      </div>

      <!-- Mismatch / validation error -->
      <div *ngIf="!error && errorMessage"
        class="tw-flex tw-items-start tw-gap-2 tw-px-4 tw-py-3 tw-mb-5 tw-rounded-lg tw-bg-red-50 tw-border tw-border-red-200 tw-text-red-800 tw-text-sm"
        role="alert">
        <app-icon name="warning" class="tw-mt-0.5 tw-shrink-0" />
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Form -->
      <div *ngIf="!error">
        <h2 class="tw-text-lg tw-font-bold tw-text-gray-900 tw-mb-1">New Password, New You!</h2>
        <p class="tw-text-sm tw-text-gray-500 tw-mb-6">Please set your new password to complete your account recovery.</p>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" novalidate>
          <div class="tw-space-y-5">

            <!-- New Password -->
            <div>
              <label for="password" class="tw-label">New Password</label>
              <div class="tw-relative">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  id="password"
                  class="tw-input tw-pr-10"
                  name="password"
                  placeholder="••••••••"
                  [(ngModel)]="password"
                  [disabled]="loading"
                  required>
                <button
                  type="button"
                  class="tw-absolute tw-inset-y-0 tw-right-0 tw-flex tw-items-center tw-px-3 tw-text-gray-400 hover:tw-text-gray-600 tw-transition-colors"
                  (click)="togglePasswordVisibility()"
                  [disabled]="loading"
                  tabindex="-1"
                  aria-label="Toggle password visibility">
                  <app-icon [name]="showPassword ? 'eye-off' : 'eye'" />
                </button>
              </div>
            </div>

            <!-- Confirm Password -->
            <div>
              <label for="validation" class="tw-label">Confirm New Password</label>
              <div class="tw-relative">
                <input
                  [type]="showValidation ? 'text' : 'password'"
                  id="validation"
                  class="tw-input tw-pr-10"
                  name="validation"
                  placeholder="••••••••"
                  [(ngModel)]="validation"
                  [disabled]="loading"
                  required>
                <button
                  type="button"
                  class="tw-absolute tw-inset-y-0 tw-right-0 tw-flex tw-items-center tw-px-3 tw-text-gray-400 hover:tw-text-gray-600 tw-transition-colors"
                  (click)="toggleValidationVisibility()"
                  [disabled]="loading"
                  tabindex="-1"
                  aria-label="Toggle password visibility">
                  <app-icon [name]="showValidation ? 'eye-off' : 'eye'" />
                </button>
              </div>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              class="tw-w-full tw-py-2.5 tw-px-4 tw-rounded-lg tw-text-white tw-font-semibold tw-text-sm tw-transition-opacity disabled:tw-opacity-60 disabled:tw-cursor-not-allowed tw-flex tw-items-center tw-justify-center tw-gap-2"
              [style.background-color]="brandColor"
              [disabled]="loading || !password || !validation">
              <svg *ngIf="loading" class="tw-animate-spin tw-h-4 tw-w-4 tw-text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="tw-opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="tw-opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
              </svg>
              {{ loading ? 'Setting Password...' : 'Set New Password' }}
            </button>

          </div>
        </form>
      </div>

    </div>

    <!-- Back link -->
    <p class="tw-text-center tw-text-sm tw-text-gray-500 tw-mt-6">
      <a (click)="goToLogin()" class="tw-font-medium tw-cursor-pointer hover:tw-underline" [style.color]="brandColor">
        ← Back to login
      </a>
    </p>

  </div>
</div>
