<div class="tw-mt-12 tw-flex tw-justify-center tw-px-4">
  <div class="tw-w-full tw-max-w-lg">
    <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden">
      <div class="tw-px-card-pad tw-pb-card-pad tw-text-center">

        <div *ngIf="loading" class="tw-p-4">
          <div class="loading-dots">
            <div></div>
            <div></div>
            <div></div>
          </div>
          <h5 class="tw-mt-3">Processing Admin Invitation...</h5>
          <p class="tw-text-muted">Please wait while we process your invitation.</p>
        </div>

        <div *ngIf="!loading && message" class="tw-p-4">
          <div
            [ngClass]="{
              'tw-px-4 tw-py-3 tw-mb-4 tw-border tw-rounded-lg tw-text-sm tw-leading-normal': true,
              'tw-border-green-200 tw-bg-green-50 tw-text-green-800': messageType === 'success',
              'tw-border-red-200 tw-bg-red-50 tw-text-red-800': messageType !== 'success'
            }">
            {{ message }}
          </div>
          <button class="btn-primary" (click)="router.navigate(['/login'])">
            Return to Login
          </button>
        </div>

      </div>
    </div>
  </div>
</div>
