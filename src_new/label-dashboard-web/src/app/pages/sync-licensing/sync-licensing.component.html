<app-breadcrumb></app-breadcrumb>
<div class="container-fluid tw-py-4">

  <div class="tw-mb-4 tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
    <div class="col">
      <h2 class="tw-mb-0">Sync Licensing</h2>
      <p class="tw-mt-2 tw-mb-0 tw-text-muted">Create and manage sync licensing pitches for your catalog.</p>
    </div>
  </div>

  <!-- Pitches Table -->
  <app-paginated-table
    title="Pitches"
    [data]="pitches"
    [pagination]="pagination"
    [loading]="loading"
    [columns]="pitchColumns"
    [showSortableHeaders]="true"
    [actions]="pitchActions"
    [showSearch]="true"
    [sortInfo]="currentSort"
    (pageChange)="onPageChange($event)"
    (filtersChange)="onFiltersChange($event)"
    [headerActions]="headerActions"
    (sortChange)="onSortChange($event)">
  </app-paginated-table>
</div>

<!-- Create/Edit Pitch Modal -->
<div class="modal fade" [class.show]="showPitchModal" [style.display]="showPitchModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ editingPitch ? 'Edit Pitch' : 'New Pitch' }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <!-- Pitch Details -->
        <div class="tw-mb-4">
          <h6 class="tw-mb-3 tw-text-muted">Pitch Details</h6>
          <div class="tw-mb-3">
            <label for="pitchTitle" class="tw-label">Title <span class="tw-text-danger">*</span></label>
            <input type="text" class="tw-input" id="pitchTitle" [(ngModel)]="pitchForm.title" placeholder="Enter pitch title">
          </div>
          <div class="tw-mb-3">
            <label for="pitchDescription" class="tw-label">Description</label>
            <textarea class="tw-input" id="pitchDescription" [(ngModel)]="pitchForm.description" rows="3" placeholder="Enter pitch description (optional)"></textarea>
          </div>
        </div>

        <!-- Song Selection -->
        <div class="tw-mb-4">
          <h6 class="tw-mb-3 tw-text-muted">Songs</h6>

          <!-- Song Search -->
          <div class="tw-mb-3">
            <div class="input-group">
              <input type="text" class="tw-input" [(ngModel)]="songSearchQuery" (input)="searchSongs()" placeholder="Search songs to add...">
              <button class="btn-secondary" type="button" [disabled]="searchingSongs">
                <i class="fas fa-search" *ngIf="!searchingSongs"></i>
                <i class="fas fa-spinner fa-spin" *ngIf="searchingSongs"></i>
              </button>
            </div>
          </div>

          <!-- Search Results -->
          <div *ngIf="songSearchResults.length > 0" class="tw-mb-3">
            <div class="list-group" style="max-height: 200px; overflow-y: auto;">
              <button type="button" class="list-group-item list-group-item-action tw-flex tw-justify-between tw-items-center"
                      *ngFor="let song of songSearchResults; trackBy: trackBySongId" (click)="addSong(song)">
                <div>
                  <strong>{{ song.title }}</strong>
                  <small class="tw-block tw-text-muted">{{ getArtistNames(song) }} &bull; {{ song.release?.title }}</small>
                  <small class="tw-text-warning tw-block" *ngIf="getSongWarnings(song).length">
                    <i class="fas fa-exclamation-triangle tw-mr-1"></i>{{ getSongWarnings(song).join(' · ') }}
                  </small>
                </div>
                <i class="fas fa-plus text-primary"></i>
              </button>
            </div>
          </div>

          <!-- Selected Songs -->
          <div *ngIf="selectedSongs.length > 0">
            <label class="tw-label tw-text-muted">Selected Songs ({{ selectedSongs.length }})</label>
            <div class="list-group">
              <div class="list-group-item tw-flex tw-justify-between tw-items-center" *ngFor="let song of selectedSongs; trackBy: trackBySongId">
                <div class="tw-flex tw-items-center">
                  <img *ngIf="song.release?.cover_art" [src]="song.release?.cover_art" class="rounded tw-mr-3" style="width: 40px; height: 40px; object-fit: cover;">
                  <div *ngIf="!song.release?.cover_art" class="bg-secondary rounded tw-mr-3 tw-flex tw-items-center tw-justify-center" style="width: 40px; height: 40px;">
                    <i class="fas fa-music tw-text-white"></i>
                  </div>
                  <div>
                    <strong>{{ song.title }}</strong>
                    <small class="tw-block tw-text-muted">{{ getArtistNames(song) }}</small>
                    <small class="tw-text-warning tw-block" *ngIf="getSongWarnings(song).length">
                      <i class="fas fa-exclamation-triangle tw-mr-1"></i>{{ getSongWarnings(song).join(' · ') }}
                    </small>
                  </div>
                </div>
                <button type="button" class="btn-sm btn-ghost tw-text-danger tw-p-1" (click)="removeSong(song)">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>
          </div>

          <div *ngIf="selectedSongs.length === 0" class="tw-py-4 border rounded tw-text-center tw-text-muted">
            <i class="fas fa-music fa-2x tw-mb-2"></i>
            <p class="tw-mb-0">No songs selected. Search and add songs above.</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="closeModal()">Cancel</button>
        <button type="button" class="btn-primary" (click)="savePitch()" [disabled]="savingPitch || !pitchForm.title.trim()">
          <i class="fas fa-spinner fa-spin tw-mr-2" *ngIf="savingPitch"></i>
          {{ editingPitch ? 'Update Pitch' : 'Create Pitch' }}
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showPitchModal" *ngIf="showPitchModal"></div>
