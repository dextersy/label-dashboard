<!-- Page Header -->
<div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-6">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3 class="tw-mb-2">
      <i class="fas fa-users-cog tw-mr-2"></i>
      Users &amp; Access
    </h3>
    <p class="tw-mb-0 tw-text-muted">Manage admin users, send invitations, and review login activity.</p>
  </div>
</div>

<app-in-page-nav [tabs]="navTabs" [activeTab]="activeSection" (tabChange)="setActiveSection($event)">

  <!-- Users Table -->
  <div *ngIf="activeSection === 'users'">
    <app-paginated-table
      title="Users"
      [data]="displayUsers"
      [pagination]="usersPagination"
      [loading]="usersLoading"
      [columns]="usersColumns"
      [showSortableHeaders]="true"
      [actions]="usersActions"
      [headerActions]="headerActions"
      [sortInfo]="usersSort"
      (pageChange)="onUsersPageChange($event)"
      (filtersChange)="onUsersFiltersChange($event)"
      (sortChange)="onUsersSortChange($event)">
    </app-paginated-table>
  </div>

  <!-- Login Attempts Table -->
  <div *ngIf="activeSection === 'login-attempts'">
    <app-paginated-table
      title="Recent Login Attempts"
      [data]="loginAttempts"
      [pagination]="loginAttemptsPagination"
      [loading]="loginAttemptsLoading"
      [columns]="loginAttemptsColumns"
      [showSortableHeaders]="true"
      [sortInfo]="loginAttemptsSort"
      (pageChange)="onLoginAttemptsPageChange($event)"
      (filtersChange)="onLoginAttemptsFiltersChange($event)"
      (sortChange)="onLoginAttemptsSortChange($event)">
    </app-paginated-table>
  </div>

</app-in-page-nav>

<!-- Admin Invite Modal -->
<div class="modal fade" [class.show]="showInviteModal" [style.display]="showInviteModal ? 'block' : 'none'"
     tabindex="-1" role="dialog" aria-labelledby="inviteAdminModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="inviteAdminModalLabel">Invite Admin</h5>
        <button type="button" class="btn-close" (click)="closeInviteModal()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="sendInvite()">
          <div class="tw-mb-3">
            <label for="email" class="tw-label">Email Address *</label>
            <input type="email"
                   class="tw-input"
                   id="email"
                   [(ngModel)]="inviteForm.email_address"
                   name="email"
                   required
                   placeholder="Enter email address">
          </div>
          <div class="tw-mb-3">
            <label for="firstName" class="tw-label">First Name</label>
            <input type="text"
                   class="tw-input"
                   id="firstName"
                   [(ngModel)]="inviteForm.first_name"
                   name="firstName"
                   placeholder="Enter first name">
          </div>
          <div class="tw-mb-3">
            <label for="lastName" class="tw-label">Last Name</label>
            <input type="text"
                   class="tw-input"
                   id="lastName"
                   [(ngModel)]="inviteForm.last_name"
                   name="lastName"
                   placeholder="Enter last name">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="closeInviteModal()">Cancel</button>
        <button type="button"
                class="btn-primary"
                (click)="sendInvite()"
                [disabled]="inviteLoading || !inviteForm.email_address.trim()">
          <span *ngIf="inviteLoading" class="spinner-border spinner-border-sm tw-mr-2" role="status" aria-hidden="true"></span>
          Send Invitation
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showInviteModal" *ngIf="showInviteModal"></div>
