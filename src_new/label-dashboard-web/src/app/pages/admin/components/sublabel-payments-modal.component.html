<div class="modal fade show" style="display: block;" *ngIf="show" (click)="onBackdropClick($event)">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Payments - {{ brandName }}</h5>
        <button type="button" class="btn-close" (click)="onClose()"></button>
      </div>
      <div class="modal-body">

        <div class="row mb-3" *ngIf="pagination">
          <div class="col-6">
            <div class="summary-box">
              <div class="summary-label">Total Payments</div>
              <div class="summary-value text-success">₱{{ totalAmount | number:'1.2-2' }}</div>
            </div>
          </div>
          <div class="col-6">
            <div class="summary-box">
              <div class="summary-label">Total Processing Fees</div>
              <div class="summary-value text-info">₱{{ totalProcessingFees | number:'1.2-2' }}</div>
            </div>
          </div>
        </div>

        <app-paginated-table
          title=""
          [data]="payments"
          [pagination]="pagination"
          [loading]="loading"
          [columns]="columns"
          [headerActions]="headerActions"
          [showSortableHeaders]="true"
          [sortInfo]="sortInfo"
          [actions]="rowActions"
          [responsiveMode]="'financial'"
          [showSearch]="false"
          (pageChange)="loadPayments($event)"
          (sortChange)="onSortChange($event)">
        </app-paginated-table>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onClose()">Close</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="show"></div>
