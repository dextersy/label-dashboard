<!-- Modal backdrop -->
<div *ngIf="isVisible" class="modal-backdrop fade show" (click)="onClose()"></div>

<!-- Modal -->
<div *ngIf="isVisible" class="modal fade show" style="display: block" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg modal-dialog-centered" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">
          <app-icon name="list" class="mr-2" />
          Expense Flow for {{ releaseTitle }}
        </h4>
        <button type="button" class="close" (click)="onClose()" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body tw-p-0">
        <app-paginated-table
          title=""
          [data]="expenses"
          [columns]="columns"
          [pagination]="pagination"
          [loading]="loading"
          [showSortableHeaders]="true"
          [responsiveMode]="'financial'"
          (pageChange)="onPageChange($event)">
        </app-paginated-table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" (click)="onClose()">Close</button>
      </div>
    </div>
  </div>
</div>
