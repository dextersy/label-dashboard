<!-- Modal backdrop -->
<div *ngIf="isVisible" class="modal-backdrop fade show" (click)="onClose()"></div>

<!-- Modal -->
<div *ngIf="isVisible" class="modal fade show" style="display: block" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">
          <i class="fa fa-list-alt mr-2"></i>
          Expense Flow for {{ releaseTitle }}
        </h4>
        <button type="button" class="close" (click)="onClose()" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body p-0">
        <app-paginated-table
          title=""
          [data]="expenses"
          [pagination]="pagination"
          [loading]="loading"
          (pageChange)="onPageChange($event)">

          <ng-template #tableContent let-data>
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Description</th>
                  <th class="text-right">Amount</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let expense of data">
                  <td>{{ formatDate(expense.date_recorded) }}</td>
                  <td>{{ expense.expense_description }}</td>
                  <td class="text-right" [ngClass]="{'text-danger': expense.expense_amount < 0, 'text-success': expense.expense_amount > 0}">
                    {{ expense.expense_amount < 0 ? '-' : '' }}{{ formatCurrency(expense.expense_amount) }}
                  </td>
                </tr>
              </tbody>
            </table>
          </ng-template>

        </app-paginated-table>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onClose()">Close</button>
      </div>
    </div>
  </div>
</div>
