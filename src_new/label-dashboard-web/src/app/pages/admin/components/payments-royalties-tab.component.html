<!-- Page Header -->
<div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-mb-6">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3 class="tw-mb-2">
      <i class="fas fa-money-check-alt tw-mr-2"></i>
      Payments &amp; Royalties
    </h3>
    <p class="tw-mb-0 tw-text-muted">Track all payments and royalty disbursements to artists.</p>
  </div>
</div>

<app-date-range-filter
  [compact]="true"
  [initialPreset]="'last30days'"
  [showComparison]="false"
  [showExport]="false"
  [loading]="loading"
  (dateRangeChange)="onDateRangeChange($event)">
</app-date-range-filter>

<div *ngIf="loading" class="tw-text-center">
  <div class="loading-dots">
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

<div *ngIf="!loading && startDate">

  <!-- Summary Cards -->
  <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-4 tw-mb-4">
    <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-px-6 tw-py-5">
      <div class="tw-flex tw-items-center">
        <div class="tw-text-3xl tw-mr-5 tw-text-success tw-opacity-80">
          <i class="fas fa-money-bill"></i>
        </div>
        <div class="tw-flex-1">
          <div class="tw-text-2xl tw-font-semibold tw-leading-tight tw-text-gray-800">{{ formatCurrency(overallTotalPayments) }}</div>
          <div class="tw-text-sm tw-text-gray-500 tw-mt-1">Total Payments</div>
        </div>
      </div>
    </div>
    <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-px-6 tw-py-5">
      <div class="tw-flex tw-items-center">
        <div class="tw-text-3xl tw-mr-5 tw-text-[#0891b2] tw-opacity-80">
          <i class="fas fa-chart-line"></i>
        </div>
        <div class="tw-flex-1">
          <div class="tw-text-2xl tw-font-semibold tw-leading-tight tw-text-gray-800">{{ formatCurrency(overallTotalRoyalties) }}</div>
          <div class="tw-text-sm tw-text-gray-500 tw-mt-1">Total Royalties</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Paginated artist table -->
  <app-paginated-table
    title="Artist Breakdown"
    [data]="artists"
    [pagination]="artistsPagination"
    [loading]="artistsLoading"
    [columns]="artistColumns"
    [showSortableHeaders]="true"
    [sortInfo]="artistsSort"
    [responsiveMode]="'financial'"
    (pageChange)="onArtistsPageChange($event)"
    (filtersChange)="onArtistsFiltersChange($event)"
    (sortChange)="onArtistsSortChange($event)">
  </app-paginated-table>

</div>

<div *ngIf="!loading && !startDate" class="tw-mt-3 tw-text-muted">
  Select a date range to view payments and royalties.
</div>
