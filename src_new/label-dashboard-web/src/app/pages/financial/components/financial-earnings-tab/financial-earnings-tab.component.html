<!-- Page Header -->
<div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-6">
  <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
    <h3 class="tw-mb-2">
      <app-icon name="currency" class="tw-mr-2" />
      Earnings
    </h3>
    <p class="tw-mb-0 tw-text-muted">A detailed breakdown of all earnings recorded for this artist.</p>
  </div>
</div>

<!-- Date Range Filter -->
<div class="tw-mb-3 tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-12">
    <app-date-range-filter
      [compact]="true"
      [loading]="loading"
      (dateRangeChange)="onDateRangeChange($event)"
      (refresh)="onRefresh()">
    </app-date-range-filter>
  </div>
</div>

<app-paginated-table
  title=""
  [data]="earnings"
  [pagination]="pagination"
  [loading]="loading"
  [columns]="earningsColumns"
  [showSortableHeaders]="true"
  [sortInfo]="earningsSort"
  [responsiveMode]="'financial'"
  [headerActions]="headerActions"
  (pageChange)="onPageChange($event)"
  (filtersChange)="filtersChange.emit($event)"
  (sortChange)="sortChange.emit($event)">

  <ng-template #mobileHeaderTemplate>
    <div class="fin-mobile-header">
      <div class="fin-mobile-header-release">Release</div>
      <div class="fin-mobile-header-amount">Amount</div>
    </div>
  </ng-template>

  <ng-template #mobileRowTemplate let-item>
    <div class="fin-mobile-row">
      <img [src]="item.cover_art || coverArtPlaceholder" alt="" class="fin-mobile-cover">
      <div class="fin-mobile-body">
        <div class="fin-mobile-release">{{ item.release_title || '(None)' }}</div>
        <div class="fin-mobile-desc">{{ item.description }}</div>
        <div class="fin-mobile-date">{{ item.date_recorded | date:'MMM d, yyyy' }}</div>
      </div>
      <div class="fin-mobile-amount" [class.text-danger]="item.amount < 0">{{ formatCurrency(item.amount) }}</div>
    </div>
  </ng-template>

</app-paginated-table>
