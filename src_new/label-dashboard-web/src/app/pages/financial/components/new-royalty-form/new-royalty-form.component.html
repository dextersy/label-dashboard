<!-- Page Header -->
<div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-mb-6">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3 class="tw-mb-2">
      <i class="fas fa-plus-circle tw-mr-2"></i>
      Add New Royalty
    </h3>
    <p class="tw-mb-0 tw-text-muted">Record a new royalty entry for this artist.</p>
  </div>
</div>

<div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-8">
    <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-p-6">
      <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-5">Royalty Details</h3>
      <form (ngSubmit)="onSubmitRoyalty()">
        <div class="tw-space-y-4">

          <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-4">
            <div>
              <label class="tw-label">Release</label>
              <select class="tw-input" [(ngModel)]="newRoyaltyForm.release_id" name="release_id" required>
                <option value="">Select a release</option>
                <option *ngFor="let release of releases" [value]="release.id">
                  {{ formatReleaseOption(release) }}
                </option>
              </select>
            </div>
            <div>
              <label class="tw-label">Date Recorded</label>
              <input type="date" class="tw-input" [(ngModel)]="newRoyaltyForm.date_recorded" name="date_recorded" required>
            </div>
          </div>

          <div>
            <label class="tw-label">Description</label>
            <textarea class="tw-input" [(ngModel)]="newRoyaltyForm.description" name="description" rows="3" placeholder="Enter royalty description" required></textarea>
          </div>

          <div>
            <label class="tw-label">Amount (PHP)</label>
            <input type="number" class="tw-input" [(ngModel)]="newRoyaltyForm.amount" name="amount" min="0" step="0.01" placeholder="0.00" required>
          </div>

        </div>

        <div class="tw-mt-5 tw-flex tw-justify-end">
          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <i class="fa fa-spinner fa-spin" *ngIf="isLoading"></i>
            <i class="fa fa-plus" *ngIf="!isLoading"></i>
            {{ isLoading ? 'Adding...' : 'Add Royalty' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
