<div class="row tw-grid tw-grid-cols-1">
  <div class="col-md-8 tw-md:tw-col-span-8">
    <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
      <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
        <h5>Add New Royalty</h5>
      </div>
      <div class="tw-px-card-pad tw-pb-card-pad">
        <form (ngSubmit)="onSubmitRoyalty()">
          <div class="row tw-grid tw-grid-cols-1">
            <div class="col-md-6 tw-md:tw-col-span-6">
              <div class="tw-mb-5">
                <label>Release</label>
                <select class="tw-input" [(ngModel)]="newRoyaltyForm.release_id" name="release_id" required>
                  <option value="">Select a release</option>
                  <option *ngFor="let release of releases" [value]="release.id">
                    {{ formatReleaseOption(release) }}
                  </option>
                </select>
              </div>
            </div>
            <div class="col-md-6 tw-md:tw-col-span-6">
              <div class="tw-mb-5">
                <label>Date Recorded</label>
                <input type="date" class="tw-input" [(ngModel)]="newRoyaltyForm.date_recorded" name="date_recorded" required>
              </div>
            </div>
          </div>
          
          <div class="tw-mb-5">
            <label>Description</label>
            <textarea class="tw-input" [(ngModel)]="newRoyaltyForm.description" name="description" rows="3" placeholder="Enter royalty description" required></textarea>
          </div>
          
          <div class="tw-mb-5">
            <label>Amount (PHP)</label>
            <input type="number" class="tw-input" [(ngModel)]="newRoyaltyForm.amount" name="amount" min="0" step="0.01" placeholder="0.00" required>
          </div>
          
          <div class="text-right">
            <button type="submit" class="btn-primary" [disabled]="isLoading">
              <i class="fa fa-spinner fa-spin" *ngIf="isLoading"></i>
              <i class="fa fa-plus" *ngIf="!isLoading"></i>
              {{ isLoading ? 'Adding...' : 'Add Royalty' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
