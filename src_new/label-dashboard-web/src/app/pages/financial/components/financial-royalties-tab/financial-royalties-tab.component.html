<!-- Page Header -->
<div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-mb-6">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3 class="tw-mb-2">
      <i class="fas fa-percentage tw-mr-2"></i>
      Royalties
    </h3>
    <p class="tw-mb-0 tw-text-muted">View all royalty entries recorded for this artist.</p>
  </div>
</div>

<!-- Date Range Filter -->
<div class="tw-mb-3 tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-12">
    <app-date-range-filter
      [compact]="true"
      [loading]="loading"
      (dateRangeChange)="onDateRangeChange($event)"
      (refresh)="onRefresh()">
    </app-date-range-filter>
  </div>
</div>

<app-paginated-table
  title=""
  [data]="royalties"
  [pagination]="pagination"
  [loading]="loading"
  [columns]="royaltiesColumns"
  [showSortableHeaders]="true"
  [sortInfo]="royaltiesSort"
  [responsiveMode]="'financial'"
  [headerActions]="headerActions"
  (pageChange)="onPageChange($event)"
  (filtersChange)="filtersChange.emit($event)"
  (sortChange)="sortChange.emit($event)">
</app-paginated-table>
