<!-- Page Header -->
<div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-6">
  <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
    <h3 class="tw-mb-2">
      <app-icon name="credit-card" class="tw-mr-2" />
      Payments
    </h3>
    <p class="tw-mb-0 tw-text-muted">Track payments made to this artist and manage payout settings.</p>
  </div>
</div>

<div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-8">
    <app-payments-table 
      [payments]="payments"
      [pagination]="paymentsPagination"
      [loading]="paymentsLoading"
      [sortInfo]="paymentsSort"
      (pageChange)="paymentsPageChange.emit($event)"
      (filtersChange)="paymentsFiltersChange.emit($event)"
      (sortChange)="paymentsSortChange.emit($event)"
      (refresh)="paymentsRefresh.emit()">
    </app-payments-table>
  </div>
  
  <div class="md:tw-col-span-4">
    <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
      <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
        <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-0">Payment Methods</h3>
      </div>
      <div class="sm:tw-px-card-pad sm:tw-pb-card-pad">
        <div *ngFor="let method of paymentMethods" class="payment-method-item">
          <div class="payment-method-avatar"
               [style.background]="getBankColor(method.type)">
            {{ getBankInitials(method.type) }}
          </div>
          <div class="payment-method-info">
            <div class="payment-method-type">{{ method.type }}</div>
            <div class="payment-method-name">{{ method.account_name }}</div>
            <div class="payment-method-number">{{ method.account_number_or_email }}</div>
          </div>
          <div class="payment-method-actions">
            <div *ngIf="method.is_default_for_artist" class="badge badge-primary tw-mb-2">Default</div>
            <div class="tw-flex tw-gap-1">
              <button
                type="button"
                class="btn-secondary btn-sm btn-icon"
                [disabled]="method.is_default_for_artist"
                (click)="setDefaultPaymentMethod(method.id)"
                title="Set as default">
                <app-icon [name]="method.is_default_for_artist ? 'star-filled' : 'star'" [class.tw-text-yellow-400]="method.is_default_for_artist" [class.tw-text-gray-300]="!method.is_default_for_artist" />
              </button>
              <button
                type="button"
                class="btn-danger btn-sm btn-icon"
                [disabled]="paymentMethods.length === 1 || method.is_default_for_artist"
                (click)="deletePaymentMethod(method.id)"
                [title]="method.is_default_for_artist ? 'Cannot delete the default payment method' : (paymentMethods.length === 1 ? 'Cannot delete the only payment method' : 'Delete payment method')">
                <app-icon name="trash" />
              </button>
            </div>
          </div>
        </div>
        
        <div *ngIf="paymentMethods.length === 0" class="tw-text-center tw-text-muted">
          No payment methods added yet.
        </div>
        
        <div class="tw-mt-4 tw-pt-4 tw-border-t tw-border-gray-100">
          <button type="button" class="btn-ghost btn-sm tw-w-full" (click)="toggleAddPaymentMethodCollapse()">
            <app-icon [name]="isAddPaymentMethodCollapsed ? 'plus' : 'x'" class="tw-mr-1" />
            {{ isAddPaymentMethodCollapsed ? 'Add Payment Method' : 'Cancel' }}
          </button>
        </div>

        <div class="collapsible-section">
          
          <div class="collapsible-content" [class.collapsed]="isAddPaymentMethodCollapsed">
            <form (ngSubmit)="onSubmitPaymentMethod()">
              <div class="tw-mb-5">
                <label>Bank Selection</label>
                <select class="tw-input" [(ngModel)]="addPaymentMethodForm.bank_selection" name="bank_selection" required>
                  <option value="">Select Bank</option>
                  <option *ngFor="let bank of supportedBanks" [value]="bank.bank_code + ',' + bank.bank_name">
                    {{ bank.bank_name }}
                  </option>
                </select>
              </div>
              
              <div class="tw-mb-5">
                <label>Account Name</label>
                <input type="text" class="tw-input" [(ngModel)]="addPaymentMethodForm.account_name" name="account_name" required>
              </div>
              
              <div class="tw-mb-5">
                <label>Account Number/Email</label>
                <input type="text" class="tw-input" [(ngModel)]="addPaymentMethodForm.account_number_or_email" name="account_number_or_email" required>
              </div>
              
              <button type="submit" class="btn-primary btn-sm" [disabled]="addingPaymentMethod">
                <span *ngIf="addingPaymentMethod" class="spinner-border spinner-border-sm tw-mr-1" role="status"></span>
                {{ addingPaymentMethod ? 'Adding...' : 'Add Payment Method' }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    
    <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8 tw-mt-3" *ngIf="payoutSettings">
      <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
        <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-0">Payout Settings</h3>
      </div>
      <div class="sm:tw-px-card-pad sm:tw-pb-card-pad">
        <form (ngSubmit)="onUpdatePayoutSettings()">
          <div class="tw-mb-5">
            <label>Payout Point (PHP)</label>
            <input type="number" class="tw-input" [(ngModel)]="payoutSettings.payout_point" name="payout_point" min="0" step="0.01">
          </div>
          
          <div class="form-check form-switch" *ngIf="isAdmin">
            <input type="checkbox" class="form-check-input" [(ngModel)]="payoutSettings.hold_payouts" name="hold_payouts" id="hold_payouts">
            <label class="form-check-label" for="hold_payouts">
              Hold Payouts
            </label>
          </div>
          
          <button type="submit" class="btn-primary btn-sm tw-mt-2">Update Settings</button>
        </form>
      </div>
    </div>
  </div>
</div>
