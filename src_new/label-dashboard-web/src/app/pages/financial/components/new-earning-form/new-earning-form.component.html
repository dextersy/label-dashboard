<!-- Page Header -->
<div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-mb-6">
  <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
    <h3 class="tw-mb-2">
      <app-icon name="plus-circle" class="tw-mr-2" />
      Add New Earning
    </h3>
    <p class="tw-mb-0 tw-text-muted">Record a new earning entry against a release for this artist.</p>
  </div>
</div>

<div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-8">
    <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-p-6">
      <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-5">Earning Details</h3>
      <form (ngSubmit)="onSubmitEarning()">
        <div class="tw-space-y-4">

          <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-4">
            <div>
              <label class="tw-label">Release</label>
              <select class="tw-input" [(ngModel)]="newEarningForm.release_id" name="release_id" required>
                <option value="">Select a release</option>
                <option *ngFor="let release of releases" [value]="release.id">
                  {{ formatReleaseOption(release) }}
                </option>
              </select>
            </div>
            <div>
              <label class="tw-label">Earning Type</label>
              <select class="tw-input" [(ngModel)]="newEarningForm.type" name="type" required>
                <option value="Streaming">Streaming</option>
                <option value="Sync">Sync</option>
                <option value="Downloads">Downloads</option>
                <option value="Physical">Physical</option>
              </select>
            </div>
            <div>
              <label class="tw-label">Date Recorded</label>
              <input type="date" class="tw-input" [(ngModel)]="newEarningForm.date_recorded" name="date_recorded" required>
            </div>
            <div>
              <label class="tw-label">Amount (PHP)</label>
              <input type="number" class="tw-input" [(ngModel)]="newEarningForm.amount" name="amount" min="0" step="0.01" placeholder="0.00" required>
            </div>
          </div>

          <div>
            <label class="tw-label">Description</label>
            <textarea class="tw-input" [(ngModel)]="newEarningForm.description" name="description" rows="3" placeholder="Enter earning description" required></textarea>
          </div>

          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" [(ngModel)]="newEarningForm.calculate_royalties" name="calculate_royalties" id="calculateRoyalties">
            <label class="form-check-label" for="calculateRoyalties">
              Calculate royalties automatically based on artist percentages
            </label>
            <p class="tw-mt-1 tw-text-xs tw-text-muted">
              When checked, this will automatically create royalty entries for all artists associated with the selected release based on their configured royalty percentages.
            </p>
          </div>

        </div>

        <div class="tw-mt-5 tw-flex tw-justify-end">
          <button type="submit" class="btn-primary" [disabled]="isLoading">
            <app-icon name="spinner" class="tw-animate-spin" *ngIf="isLoading" />
            <app-icon name="plus" *ngIf="!isLoading" />
            {{ isLoading ? 'Adding...' : 'Add Earning' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
