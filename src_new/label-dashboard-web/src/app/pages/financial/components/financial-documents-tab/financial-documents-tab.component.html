<!-- Page Header -->
<div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-6">
  <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
    <h3 class="tw-mb-2">
      <app-icon name="folder" class="tw-mr-2" />
      Documents
    </h3>
    <p class="tw-mb-0 tw-text-muted">Upload and manage financial documents for this artist.</p>
  </div>
</div>

<div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6">
  <div class="md:tw-col-span-8">
    <app-paginated-table
      title="Financial Documents"
      [data]="documents"
      [pagination]="null"
      [loading]="false"
      [columns]="docColumns"
      [showSearch]="false"
      [showSortableHeaders]="true"
      [showActionsColumn]="true"
      [actions]="docActions">

      <ng-template #mobileRowTemplate let-doc let-toggleKebab="toggleKebab" let-isKebabOpen="isKebabOpen" let-visibleActions="visibleActions">
        <div class="doc-mobile-row">
          <div class="doc-mobile-badge-col">
            <span class="doc-mobile-badge" [style.background]="getFileTypeInfo(doc.filename).bgColor">
              {{ getFileTypeInfo(doc.filename).label }}
            </span>
          </div>
          <div class="doc-mobile-body">
            <div class="doc-mobile-title">{{ doc.title }}</div>
            <div class="doc-mobile-filename">{{ doc.filename }}</div>
            <div class="doc-mobile-date">{{ formatDate(doc.upload_date) }}</div>
          </div>
          <div class="doc-mobile-actions" (click)="$event.stopPropagation()">
            <button class="kebab-btn" type="button" (click)="toggleKebab($event)" [class.active]="isKebabOpen">
              <app-icon name="more-vertical" iconOnly />
            </button>
          </div>
        </div>
      </ng-template>

    </app-paginated-table>
  </div>
  
  <div class="md:tw-col-span-4">
    <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
      <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
        <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-0">Upload Document</h3>
      </div>
      <div class="sm:tw-px-card-pad sm:tw-pb-card-pad">
        <form (ngSubmit)="onUploadDocument()">
          <div class="tw-mb-5 tw-mb-3">
            <label for="documentTitle" class="tw-label">Document Title</label>
            <input
              type="text"
              id="documentTitle"
              class="tw-input"
              [(ngModel)]="documentUploadForm.title"
              name="documentTitle"
              placeholder="Enter document title"
              required>
          </div>

          <div class="tw-mb-5 tw-mb-3">
            <label for="documentFile" class="tw-label">Choose File</label>
            <input
              type="file"
              id="documentFile"
              class="tw-block tw-w-full tw-text-sm tw-text-gray-500
                     file:tw-mr-3 file:tw-py-1.5 file:tw-px-3
                     file:tw-rounded file:tw-border-0
                     file:tw-text-sm file:tw-font-medium
                     file:tw-bg-gray-100 file:tw-text-gray-700
                     hover:file:tw-bg-gray-200 tw-cursor-pointer"
              (change)="onFileSelected($event)"
              accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.jpg,.jpeg,.png,.gif"
              required>
            <small class="form-text tw-text-muted">
              Supported formats: PDF, DOC, DOCX, XLS, XLSX, TXT, JPG, PNG, GIF (Max 25MB)
            </small>
          </div>
          
          <button 
            type="submit" 
            class="btn-primary btn-sm tw-w-full"
            [disabled]="uploadingDocument || !documentUploadForm.title || !documentUploadForm.file">
            <span *ngIf="uploadingDocument" class="spinner-border spinner-border-sm tw-mr-1" role="status"></span>
            <app-icon name="upload" class="tw-mr-1" *ngIf="!uploadingDocument" />
            {{ uploadingDocument ? 'Uploading...' : 'Upload Document' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Document Viewer Lightbox -->
<app-document-viewer
  [document]="selectedDocument"
  [isVisible]="showDocumentViewer"
  (close)="closeDocumentViewer()">
</app-document-viewer>
