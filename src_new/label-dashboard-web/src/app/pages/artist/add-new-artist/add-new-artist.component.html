<div class="add-new-artist-page">
  <app-breadcrumb></app-breadcrumb>
  <div class="container-fluid">

    
    <!-- Alert Messages -->
    <div *ngIf="alertMessage" class="tw-px-4 tw-py-3 tw-mb-4 tw-border tw-rounded-lg tw-text-sm tw-leading-normal" [class.alert-success]="alertMessage.type === 'success'" [class.alert-danger]="alertMessage.type === 'error'" role="alert">
      {{ alertMessage.message }}
      <button type="button" class="btn-close" aria-label="Close" (click)="alertMessage = null"></button>
    </div>

    <div class="add-new-artist">
  <form id="newArtistForm" (ngSubmit)="createArtist()" #newArtistForm="ngForm">
    
    <!-- Top Row: Basic Information and Profile Photo side by side -->
    <div class="row tw-grid tw-grid-cols-1">
      <!-- Basic Information Section -->
      <div class="col-lg-8 tw-lg:tw-col-span-8">
        <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
            <h5>Basic Information</h5>
          </div>
          <div class="tw-px-card-pad tw-pb-card-pad">
            <div class="tw-mb-5">
              <label for="artistName">Artist Name <span class="tw-text-danger">*</span></label>
              <input type="text" 
                     class="tw-input" 
                     id="artistName"
                     name="artistName"
                     [(ngModel)]="newArtist.name"
                     required
                     placeholder="Enter artist name">
            </div>
            
            <div class="tw-mb-5">
              <label for="bandMembers">Band Members</label>
              <textarea class="tw-input" 
                        id="bandMembers"
                        name="bandMembers"
                        rows="3"
                        [(ngModel)]="newArtist.band_members"
                        placeholder="Enter band members, one per line or separated by commas"></textarea>
            </div>
            
            <div class="tw-mb-5">
              <label for="bio">Biography</label>
              <textarea class="tw-input" 
                        id="bio"
                        name="bio"
                        rows="4"
                        [(ngModel)]="newArtist.bio"
                        placeholder="Tell us about the artist..."></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- Profile Photo Section -->
      <div class="col-lg-4 tw-lg:tw-col-span-4">
        <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
            <h5>Profile Photo</h5>
          </div>
          <div class="tw-px-card-pad tw-pb-card-pad">
            <div class="current-photo">
              <img [src]="previewImageUrl || 'assets/img/placeholder.jpg'" 
                   class="img-thumbnail current-photo-img" 
                   alt="Artist photo preview">
            </div>
            
            <div class="tw-mb-5">
              <label for="profilePhoto" class="file-upload-label">Upload Photo</label>
              <input type="file" 
                     class="form-control-file" 
                     id="profilePhoto"
                     name="profilePhoto"
                     (change)="onFileSelected($event)"
                     accept="image/jpeg,image/jpg,image/png,image/gif">
              <small class="form-text">
                Accepted formats: JPEG, PNG, GIF. Maximum size: 5MB.
              </small>
            </div>
            
            <div *ngIf="uploadProgress > 0 && uploadProgress < 100" class="progress tw-mt-2">
              <div class="progress-bar" 
                   role="progressbar" 
                   [style.width.%]="uploadProgress">
                {{ uploadProgress }}%
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Social Links Section -->
    <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8">
      <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
        <h5>Social Media & Links</h5>
      </div>
      <div class="tw-px-card-pad tw-pb-card-pad">
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="website">Website</label>
              <input type="url" 
                     class="tw-input" 
                     id="website"
                     name="website"
                     [(ngModel)]="newArtist.website_page_url"
                     placeholder="https://www.example.com">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="facebook">Facebook</label>
              <input type="text" 
                     class="tw-input" 
                     id="facebook"
                     name="facebook"
                     [(ngModel)]="newArtist.facebook_handle"
                     placeholder="Facebook username">
            </div>
          </div>
        </div>
        
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="instagram">Instagram</label>
              <input type="text" 
                     class="tw-input" 
                     id="instagram"
                     name="instagram"
                     [(ngModel)]="newArtist.instagram_handle"
                     placeholder="Instagram username">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="twitter">Twitter</label>
              <input type="text" 
                     class="tw-input" 
                     id="twitter"
                     name="twitter"
                     [(ngModel)]="newArtist.twitter_handle"
                     placeholder="Twitter username">
            </div>
          </div>
        </div>
        
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="tiktok">TikTok</label>
              <input type="text" 
                     class="tw-input" 
                     id="tiktok"
                     name="tiktok"
                     [(ngModel)]="newArtist.tiktok_handle"
                     placeholder="TikTok username">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="tw-mb-5">
              <label for="youtube">YouTube Channel</label>
              <input type="text" 
                     class="tw-input" 
                     id="youtube"
                     name="youtube"
                     [(ngModel)]="newArtist.youtube_channel"
                     placeholder="YouTube channel URL or name">
            </div>
          </div>
        </div>
      </div>
    </div>

  </form>
</div>

<!-- Floating Action Bar -->
<app-floating-action-bar>
  <button type="button"
          class="btn-secondary"
          (click)="cancel()"
          [disabled]="creating">
    Cancel
  </button>
  <button type="button"
          class="btn-primary fab-primary-btn"
          [disabled]="creating || !isFormValid()"
          (click)="createArtist()">
    <i class="fa fa-spinner fa-spin" *ngIf="creating"></i>
    <i class="fa fa-plus" *ngIf="!creating"></i>
    {{ creating ? 'Creating...' : 'Create Artist' }}
  </button>
</app-floating-action-bar>
</div>
