<div class="artist-page">
  <app-breadcrumb></app-breadcrumb>
  <div class="container-fluid">
    <!-- Main Content -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="selectedArtist">
      <div class="tw-col-span-12">
        
        <!-- Tab Content (no navigation needed, handled by sidebar) -->
        <!-- Profile Tab (no card wrapper for minimalist design) -->
        <div *ngIf="activeTab === 'profile'">
          <app-artist-profile-tab 
            [artist]="selectedArtist"
            (alertMessage)="onAlertMessage($event)"
            (artistUpdated)="onArtistUpdated($event)">
          </app-artist-profile-tab>
        </div>
        
        <!-- Gallery Tab -->
        <div *ngIf="activeTab === 'gallery'">
          <app-artist-gallery-tab 
            [artist]="selectedArtist"
            (alertMessage)="onAlertMessage($event)"
            (profilePhotoUpdated)="onArtistUpdated($event)">
          </app-artist-gallery-tab>
        </div>
        
        <!-- Releases Tab -->
        <div *ngIf="activeTab === 'releases'">
          <app-artist-releases-tab 
            [artist]="selectedArtist"
            (alertMessage)="onAlertMessage($event)">
          </app-artist-releases-tab>
        </div>
        
        <!-- Team Tab -->
        <div *ngIf="activeTab === 'team'">
          <app-artist-team-tab
            [artist]="selectedArtist"
            (alertMessage)="onAlertMessage($event)">
          </app-artist-team-tab>
        </div>

        <!-- Manage EPK Tab -->
        <div *ngIf="activeTab === 'manage-epk'">
          <app-artist-manage-epk-tab
            [artist]="selectedArtist"
            (alertMessage)="onAlertMessage($event)"
            (artistUpdated)="onArtistUpdated($event)">
          </app-artist-manage-epk-tab>
        </div>
        
      </div>
    </div>
    
    <!-- Loading Artists -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="loading">
      <div class="tw-col-span-12">
        <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pb-card-pad tw-p-5 tw-text-center">
            <div class="loading-dots">
              <div></div>
              <div></div>
              <div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- No Artists Available -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="!loading && !selectedArtist && availableArtists.length === 0">
      <div class="tw-col-span-12">
        <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pb-card-pad tw-p-5 tw-text-center">
            <app-icon name="user-plus" class="fa-4x tw-mb-3 tw-text-muted" />
            <h4>No Artists Available</h4>
            <p class="tw-text-muted">No artists found for your label. Create a new artist to get started.</p>
            <button class="btn-primary" *ngIf="isAdmin" (click)="openCreateArtistModal()">
              <app-icon name="plus" class="tw-mr-1" />Create New Artist
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- No Artist Selected (but artists are available) -->
    <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-12 tw-gap-6" *ngIf="!loading && !selectedArtist && availableArtists.length > 0">
      <div class="tw-col-span-12">
        <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8">
          <div class="tw-px-card-pad tw-pb-card-pad tw-p-5 tw-text-center">
            <app-icon name="user" class="fa-4x tw-mb-3 tw-text-muted" />
            <h4>No Artist Selected</h4>
            <p class="tw-text-muted">Please select an artist from the dropdown above to manage their profile.</p>
          </div>
        </div>
      </div>
    </div>
    
  </div>
</div>
