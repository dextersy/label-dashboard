<div class="artist-releases-tab">
  <app-paginated-table
    title="Artist Releases"
    [data]="filteredReleases"
    [pagination]="null"
    [loading]="loading"
    [columns]="releaseColumns"
    [showSearch]="false"
    [showSortableHeaders]="true"
    [showActionsColumn]="true"
    [actions]="releaseActions"
    [headerActions]="headerActions">

    <ng-template #customButtons>
      <div class="filter-controls d-flex align-items-center tw-flex tw-items-center">
        <div class="btn-group d-none d-md-flex tw-hidden tw-md:tw-flex" role="group">
          <input type="radio" class="btn-check" name="epkFilter" id="epkFilterAll" value="all" [(ngModel)]="epkFilter" autocomplete="off">
          <label class="btn btn-sm btn-secondary" for="epkFilterAll">All</label>

          <input type="radio" class="btn-check" name="epkFilter" id="epkFilterVisible" value="visible" [(ngModel)]="epkFilter" autocomplete="off">
          <label class="btn btn-sm btn-secondary" for="epkFilterVisible">
            <i class="fa fa-globe"></i> <span class="d-none d-lg-inline tw-hidden">Visible in EPK</span>
          </label>

          <input type="radio" class="btn-check" name="epkFilter" id="epkFilterHidden" value="hidden" [(ngModel)]="epkFilter" autocomplete="off">
          <label class="btn btn-sm btn-secondary" for="epkFilterHidden">
            <i class="fa fa-eye-slash"></i> <span class="d-none d-lg-inline tw-hidden">Hidden from EPK</span>
          </label>
        </div>
        <select class="form-select form-select-sm d-md-none tw-md:tw-hidden tw-input" [(ngModel)]="epkFilter">
          <option value="all">All</option>
          <option value="visible">Visible in EPK</option>
          <option value="hidden">Hidden from EPK</option>
        </select>
      </div>
    </ng-template>

  </app-paginated-table>
</div>
