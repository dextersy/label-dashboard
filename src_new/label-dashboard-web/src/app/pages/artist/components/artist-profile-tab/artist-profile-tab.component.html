<div class="artist-profile-tab">

  <!-- Page Header -->
  <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card tw-overflow-hidden tw-mb-6">
    <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
      <h3 class="tw-mb-2">
        <i class="fas fa-id-card tw-mr-2"></i>
        Manage Profile
      </h3>
      <p class="tw-mb-0 tw-text-muted">Update your artist bio, social links, and public-facing profile information.</p>
    </div>
  </div>

  <form id="profileForm" (ngSubmit)="saveProfile()" #profileForm="ngForm" *ngIf="artist">

    <!-- Top row: Basic Info + Photo -->
    <div class="tw-grid tw-grid-cols-1 lg:tw-grid-cols-3 tw-gap-6 tw-mb-6">

      <!-- Basic Information -->
      <div class="lg:tw-col-span-2 tw-bg-white lg:tw-rounded-card lg:tw-shadow-card lg:tw-p-6">
        <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-5">Basic Information</h3>
        <div class="tw-space-y-4">
          <div>
            <label for="artistName" class="tw-label">Artist Name <span class="tw-text-danger">*</span></label>
            <input type="text"
                   class="tw-input"
                   id="artistName"
                   name="artistName"
                   [(ngModel)]="editingProfile.name"
                   required
                   placeholder="Enter artist name">
          </div>
          <div>
            <label for="bandMembers" class="tw-label">Band Members</label>
            <textarea class="tw-input"
                      id="bandMembers"
                      name="bandMembers"
                      rows="3"
                      [(ngModel)]="editingProfile.band_members"
                      placeholder="Enter band members, one per line or separated by commas"></textarea>
          </div>
          <div>
            <label for="bio" class="tw-label">Biography</label>
            <quill-editor
              id="bio"
              name="bio"
              [(ngModel)]="editingProfile.bio"
              [modules]="quillConfig"
              (onContentChanged)="onBioContentChanged($event)"
              placeholder="Tell us about the artist...">
            </quill-editor>
            <p class="tw-mt-1 tw-text-xs"
               [class.tw-text-danger]="bioCharCount > bioCharLimit"
               [class.tw-text-muted]="bioCharCount <= bioCharLimit">
              {{ bioCharCount | number }} / {{ bioCharLimit | number }} characters
            </p>
          </div>
        </div>
      </div>

      <!-- Profile Photo -->
      <div class="tw-bg-white lg:tw-rounded-card lg:tw-shadow-card lg:tw-p-6">
        <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-5">Profile Photo</h3>
        <div class="tw-flex tw-flex-col tw-items-center tw-gap-5">
          <img [src]="getProfilePhotoUrl()"
               [alt]="editingProfile.name"
               class="tw-w-32 tw-h-32 tw-rounded-full tw-object-cover tw-border-2 tw-border-gray-100">
          <div class="tw-w-full tw-space-y-1">
            <label for="profilePhoto" class="tw-label">Upload New Photo</label>
            <input type="file"
                   class="tw-block tw-w-full tw-text-sm tw-text-gray-500
                          file:tw-mr-3 file:tw-py-1.5 file:tw-px-3
                          file:tw-rounded file:tw-border-0
                          file:tw-text-sm file:tw-font-medium
                          file:tw-bg-gray-100 file:tw-text-gray-700
                          hover:file:tw-bg-gray-200 tw-cursor-pointer"
                   id="profilePhoto"
                   name="profilePhoto"
                   (change)="onFileSelected($event)"
                   accept="image/jpeg,image/jpg,image/png,image/gif">
            <p class="tw-text-xs tw-text-muted">JPEG, PNG or GIF · max 5 MB</p>
          </div>
          <div *ngIf="uploadProgress > 0 && uploadProgress < 100" class="tw-w-full">
            <div class="tw-w-full tw-bg-gray-100 tw-rounded-full tw-h-1.5">
              <div class="tw-bg-blue-500 tw-h-1.5 tw-rounded-full tw-transition-all"
                   [style.width.%]="uploadProgress"></div>
            </div>
            <p class="tw-mt-1 tw-text-xs tw-text-muted tw-text-right">{{ uploadProgress }}%</p>
          </div>
        </div>
      </div>

    </div>

    <!-- Social Media & Links -->
    <div class="tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-p-6 tw-mb-6">
      <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-5">Social Media & Links</h3>
      <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-4">
        <div>
          <label for="website" class="tw-label">Website</label>
          <input type="url"
                 class="tw-input"
                 id="website"
                 name="website"
                 [(ngModel)]="editingProfile.website_page_url"
                 placeholder="https://www.example.com">
        </div>
        <div>
          <label for="facebook" class="tw-label">Facebook</label>
          <input type="text"
                 class="tw-input"
                 id="facebook"
                 name="facebook"
                 [(ngModel)]="editingProfile.facebook_handle"
                 placeholder="Facebook username">
        </div>
        <div>
          <label for="instagram" class="tw-label">Instagram</label>
          <input type="text"
                 class="tw-input"
                 id="instagram"
                 name="instagram"
                 [(ngModel)]="editingProfile.instagram_handle"
                 placeholder="Instagram username">
        </div>
        <div>
          <label for="twitter" class="tw-label">Twitter / X</label>
          <input type="text"
                 class="tw-input"
                 id="twitter"
                 name="twitter"
                 [(ngModel)]="editingProfile.twitter_handle"
                 placeholder="Twitter username">
        </div>
        <div>
          <label for="tiktok" class="tw-label">TikTok</label>
          <input type="text"
                 class="tw-input"
                 id="tiktok"
                 name="tiktok"
                 [(ngModel)]="editingProfile.tiktok_handle"
                 placeholder="TikTok username">
        </div>
        <div>
          <label for="youtube" class="tw-label">YouTube Channel</label>
          <input type="text"
                 class="tw-input"
                 id="youtube"
                 name="youtube"
                 [(ngModel)]="editingProfile.youtube_channel"
                 placeholder="YouTube channel URL or name">
        </div>
      </div>
    </div>

  </form>
</div>

<!-- Floating Action Bar -->
<app-floating-action-bar *ngIf="artist">
  <button type="button"
          class="btn-primary fab-primary-btn"
          [disabled]="saving || !isFormValid()"
          (click)="saveProfile()">
    <div class="loading-spinner" *ngIf="saving"></div>
    <i class="fa fa-save" *ngIf="!saving"></i>
    {{ saving ? 'Saving...' : 'Save Changes' }}
  </button>
</app-floating-action-bar>
