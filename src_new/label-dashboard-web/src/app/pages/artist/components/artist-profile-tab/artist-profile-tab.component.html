<div class="artist-profile-tab">
  <form id="profileForm" (ngSubmit)="saveProfile()" #profileForm="ngForm" *ngIf="artist">
    
    <!-- Top Row: Basic Information and Profile Photo side by side -->
    <div class="row tw-grid tw-grid-cols-1">
      <!-- Basic Information Section -->
      <div class="col-lg-8 tw-lg:tw-col-span-8">
        <div class="card">
          <div class="card-header">
            <h5>Basic Information</h5>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="artistName">Artist Name <span class="text-danger tw-text-danger">*</span></label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="artistName"
                     name="artistName"
                     [(ngModel)]="editingProfile.name"
                     required
                     placeholder="Enter artist name">
            </div>
            
            <div class="form-group">
              <label for="bandMembers">Band Members</label>
              <textarea class="form-control tw-input" 
                        id="bandMembers"
                        name="bandMembers"
                        rows="3"
                        [(ngModel)]="editingProfile.band_members"
                        placeholder="Enter band members, one per line or separated by commas"></textarea>
            </div>
            
            <div class="form-group">
              <label for="bio">Biography</label>
              <quill-editor
                id="bio"
                name="bio"
                [(ngModel)]="editingProfile.bio"
                [modules]="quillConfig"
                (onContentChanged)="onBioContentChanged($event)"
                placeholder="Tell us about the artist...">
              </quill-editor>
              <small class="form-text" [class.text-danger]="bioCharCount > bioCharLimit" [class.text-muted]="bioCharCount <= bioCharLimit">
                {{ bioCharCount | number }} / {{ bioCharLimit | number }} characters
              </small>
            </div>
          </div>
        </div>
      </div>

      <!-- Profile Photo Section -->
      <div class="col-lg-4 tw-lg:tw-col-span-4">
        <div class="card">
          <div class="card-header">
            <h5>Profile Photo</h5>
          </div>
          <div class="card-body">
            <div class="current-photo">
              <img [src]="getProfilePhotoUrl()" 
                   class="img-thumbnail current-photo-img" 
                   [alt]="editingProfile.name">
            </div>
            
            <div class="form-group">
              <label for="profilePhoto" class="file-upload-label">Upload New Photo</label>
              <input type="file" 
                     class="form-control-file" 
                     id="profilePhoto"
                     name="profilePhoto"
                     (change)="onFileSelected($event)"
                     accept="image/jpeg,image/jpg,image/png,image/gif">
              <small class="form-text">
                Accepted formats: JPEG, PNG, GIF. Maximum size: 5MB.
              </small>
            </div>
            
            <div *ngIf="uploadProgress > 0 && uploadProgress < 100" class="progress mt-2 tw-mt-2">
              <div class="progress-bar" 
                   role="progressbar" 
                   [style.width.%]="uploadProgress">
                {{ uploadProgress }}%
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Social Links Section -->
    <div class="card">
      <div class="card-header">
        <h5>Social Media & Links</h5>
      </div>
      <div class="card-body">
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="website">Website</label>
              <input type="url" 
                     class="form-control tw-input" 
                     id="website"
                     name="website"
                     [(ngModel)]="editingProfile.website_page_url"
                     placeholder="https://www.example.com">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="facebook">Facebook</label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="facebook"
                     name="facebook"
                     [(ngModel)]="editingProfile.facebook_handle"
                     placeholder="Facebook username">
            </div>
          </div>
        </div>
        
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="instagram">Instagram</label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="instagram"
                     name="instagram"
                     [(ngModel)]="editingProfile.instagram_handle"
                     placeholder="Instagram username">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="twitter">Twitter</label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="twitter"
                     name="twitter"
                     [(ngModel)]="editingProfile.twitter_handle"
                     placeholder="Twitter username">
            </div>
          </div>
        </div>
        
        <div class="row tw-grid tw-grid-cols-1">
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="tiktok">TikTok</label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="tiktok"
                     name="tiktok"
                     [(ngModel)]="editingProfile.tiktok_handle"
                     placeholder="TikTok username">
            </div>
          </div>
          <div class="col-md-6 tw-md:tw-col-span-6">
            <div class="form-group">
              <label for="youtube">YouTube Channel</label>
              <input type="text" 
                     class="form-control tw-input" 
                     id="youtube"
                     name="youtube"
                     [(ngModel)]="editingProfile.youtube_channel"
                     placeholder="YouTube channel URL or name">
            </div>
          </div>
        </div>
      </div>
    </div>

  </form>
</div>

<!-- Floating Action Bar -->
<app-floating-action-bar *ngIf="artist">
  <button type="button"
          class="btn btn-primary fab-primary-btn"
          [disabled]="saving || !isFormValid()"
          (click)="saveProfile()">
    <div class="loading-spinner" *ngIf="saving"></div>
    <i class="fa fa-save" *ngIf="!saving"></i>
    {{ saving ? 'Saving...' : 'Save Changes' }}
  </button>
</app-floating-action-bar>
