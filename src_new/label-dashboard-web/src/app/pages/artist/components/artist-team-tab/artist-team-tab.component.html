<div class="artist-team-tab">

  <app-paginated-table
    title="Team Members"
    [data]="teamMembers"
    [pagination]="null"
    [loading]="loading"
    [columns]="teamColumns"
    [showSearch]="false"
    [showSortableHeaders]="true"
    [showActionsColumn]="true"
    [actions]="teamActions">
  </app-paginated-table>

  <!-- Invite New Member Section -->
  <div class="tw-bg-white tw-rounded-card tw-shadow-card tw-overflow-hidden tw-mb-8 invite-section tw-mt-4">
    <div class="tw-px-card-pad tw-pt-card-pad tw-pb-4">
      <h5>Invite Team Member</h5>
    </div>
    <div class="tw-px-card-pad tw-pb-card-pad">
      <form (ngSubmit)="sendInvite()" #inviteForm="ngForm">
        <div class="row tw-items-end tw-grid tw-grid-cols-1">
          <div class="col-md-8 tw-md:tw-col-span-8">
            <div class="tw-mb-5 tw-mb-0">
              <label for="inviteEmail" class="tw-label">Email Address</label>
              <input type="email"
                     class="tw-input"
                     id="inviteEmail"
                     name="inviteEmail"
                     [(ngModel)]="inviteEmail"
                     required
                     email
                     placeholder="Enter team member's email address"
                     [disabled]="sendingInvite">
            </div>
          </div>
          <div class="col-md-4 tw-md:tw-col-span-4">
            <div class="tw-mb-5 tw-mb-0">
              <button type="submit"
                      class="btn-primary tw-w-full"
                      [disabled]="!inviteForm.form.valid || sendingInvite">
                <div class="loading-spinner" *ngIf="sendingInvite"></div>
                <i class="fa fa-paper-plane" *ngIf="!sendingInvite"></i>
                {{ sendingInvite ? 'Sending...' : 'Send Invite' }}
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

</div>
