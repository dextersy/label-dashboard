<div class="artist-team-tab">

  <!-- Page Header -->
  <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-6">
    <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
      <h3 class="tw-mb-2">
        <app-icon name="users" class="tw-mr-2" />
        Team
      </h3>
      <p class="tw-mb-0 tw-text-muted">Manage team members who have access to this artist's profile.</p>
    </div>
  </div>

  <app-paginated-table
    title="Team Members"
    [data]="teamMembers"
    [pagination]="null"
    [loading]="loading"
    [columns]="teamColumns"
    [showSearch]="false"
    [showSortableHeaders]="true"
    [showActionsColumn]="true"
    [actions]="teamActions">

    <ng-template #mobileRowTemplate let-member let-toggleKebab="toggleKebab" let-isKebabOpen="isKebabOpen" let-visibleActions="visibleActions">
      <div class="member-card">
        <div class="member-card__header">
          <div class="member-card__avatar" [style.background-color]="getAvatarColor(member.name)">
            {{ getInitials(member.name) }}
          </div>
          <div class="member-card__info">
            <div class="member-card__name">{{ member.name }}</div>
            <div class="member-card__email">{{ member.email }}</div>
          </div>
          <span class="status-badge"
                [class.status-success]="member.status === 'Accepted'"
                [class.status-warning]="member.status === 'Pending'"
                [class.status-secondary]="member.status !== 'Accepted' && member.status !== 'Pending'">
            {{ member.status }}
          </span>
          <button *ngIf="visibleActions.length > 0"
                  class="member-card__menu kebab-btn"
                  type="button"
                  (click)="toggleKebab($event)"
                  [class.active]="isKebabOpen">
            <app-icon name="more-vertical" iconOnly />
          </button>
        </div>
        <div class="member-card__footer">
          <app-icon name="calendar" /> Invited {{ formatDate(member.invited_date) }}
        </div>
      </div>
    </ng-template>

  </app-paginated-table>

  <!-- Invite New Member Section -->
  <div class="sm:tw-bg-white sm:tw-rounded-card sm:tw-shadow-card sm:tw-overflow-hidden tw-mb-8 invite-section tw-mt-4 md:tw-max-w-lg">
    <div class="sm:tw-px-card-pad sm:tw-pt-card-pad sm:tw-pb-4">
      <h3 class="tw-text-sm tw-font-semibold tw-uppercase tw-tracking-wider tw-text-gray-500 tw-mb-0">Invite Team Member</h3>
    </div>
    <div class="tw-px-card-pad tw-pb-card-pad">
      <form (ngSubmit)="sendInvite()" #inviteForm="ngForm">
        <div class="tw-flex tw-flex-wrap md:tw-flex-nowrap tw-items-end tw-gap-2">
          <div class="tw-w-full md:tw-flex-1">
            <label for="inviteEmail" class="tw-label">Email Address</label>
            <input type="email"
                   class="tw-input"
                   id="inviteEmail"
                   name="inviteEmail"
                   [(ngModel)]="inviteEmail"
                   required
                   email
                   placeholder="Enter team member's email address"
                   [disabled]="sendingInvite">
          </div>
          <div class="tw-w-full md:tw-w-auto tw-shrink-0">
              <button type="submit"
                      class="btn-sm btn-primary tw-w-full md:tw-w-auto"
                      [disabled]="!inviteForm.form.valid || sendingInvite">
                <div class="loading-spinner" *ngIf="sendingInvite"></div>
                <app-icon name="paper-plane" *ngIf="!sendingInvite" />
                {{ sendingInvite ? 'Sending...' : 'Send Invite' }}
              </button>
          </div>
        </div>
      </form>
    </div>
  </div>

</div>
