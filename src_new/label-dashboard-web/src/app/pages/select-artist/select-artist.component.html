<app-breadcrumb></app-breadcrumb>
<div class="container-fluid">

  <!-- Loading state -->
  <div *ngIf="loading" class="tw-py-5 tw-text-center">
    <div class="loading-dots">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <!-- Error state -->
  <div *ngIf="error" class="tw-px-4 tw-py-3 tw-mb-4 tw-border tw-rounded-lg tw-text-sm tw-leading-normal tw-border-red-200 tw-bg-red-50 tw-text-red-800" role="alert">
    <app-icon name="warning" /> {{ error }}
    <button class="btn-sm btn-danger ml-2" (click)="loadArtists()">
      <app-icon name="refresh" /> Retry
    </button>
  </div>

  <!-- Artist Selection Content -->
  <div *ngIf="!loading && !error" class="select-artist-content">
    <!-- Header -->
    <div class="select-artist-header tw-mb-5 tw-text-center">
      <h1 class="select-title">Select an Artist</h1>
      <p class="select-subtitle">Choose an artist to view and manage their profile</p>
    </div>

    <!-- No Artists State -->
    <div *ngIf="artists.length === 0" class="no-artists tw-py-5 tw-text-center">
      <div class="no-artists-icon tw-mb-4">
        <app-icon name="users" />
      </div>
      <h3>No Artists Found</h3>
      <p class="tw-text-muted">You don't have any artists yet.</p>
      <button *ngIf="isAdmin" class="btn-primary tw-mt-3" (click)="addNewArtist()">
        <app-icon name="plus" class="tw-mr-2" />Add New Artist
      </button>
    </div>

    <!-- Artist Grid -->
    <div *ngIf="artists.length > 0" class="artist-grid">
      <div 
        *ngFor="let artist of artists" 
        class="artist-card"
        (click)="selectArtist(artist)"
        tabindex="0"
        (keydown.enter)="selectArtist(artist)"
        (keydown.space)="selectArtist(artist); $event.preventDefault()">
        <div class="artist-photo-container">
          <img 
            *ngIf="getArtistPhotoUrl(artist)" 
            [src]="getArtistPhotoUrl(artist)" 
            [alt]="artist.name"
            class="artist-photo">
          <div *ngIf="!getArtistPhotoUrl(artist)" class="artist-photo-placeholder">
            {{ getArtistInitials(artist) }}
          </div>
        </div>
        <div class="artist-info">
          <h3 class="artist-name">{{ artist.name }}</h3>
          <p *ngIf="artist.band_members" class="artist-members">{{ artist.band_members }}</p>
        </div>
        <div class="artist-select-indicator">
          <app-icon name="chevron-right" />
        </div>
      </div>

      <!-- Add New Artist Card (Admin Only) -->
      <div 
        *ngIf="isAdmin" 
        class="artist-card add-artist-card"
        (click)="addNewArtist()"
        tabindex="0"
        (keydown.enter)="addNewArtist()"
        (keydown.space)="addNewArtist(); $event.preventDefault()">
        <div class="artist-photo-container">
          <div class="artist-photo-placeholder add-icon">
            <app-icon name="plus" />
          </div>
        </div>
        <div class="artist-info">
          <h3 class="artist-name">Add New Artist</h3>
          <p class="artist-members">Create a new artist profile</p>
        </div>
        <div class="artist-select-indicator">
          <app-icon name="chevron-right" />
        </div>
      </div>
    </div>
  </div>
</div>
