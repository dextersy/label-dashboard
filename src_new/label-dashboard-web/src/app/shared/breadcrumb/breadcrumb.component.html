<nav aria-label="breadcrumb" *ngIf="workspaceLabel || breadcrumbs.length > 0">
  <ol class="breadcrumb">
    <li class="breadcrumb-item" *ngIf="workspaceLabel">
      <span class="breadcrumb-workspace">
        <app-icon [name]="workspaceIcon" class="tw-mr-1" />{{ workspaceLabel }}
      </span>
    </li>
    <li *ngFor="let crumb of filteredBreadcrumbs; let last = last"
        class="breadcrumb-item"
        [class.active]="last">

      <a *ngIf="!last && crumb.route"
         [routerLink]="crumb.route"
         class="breadcrumb-link">
        <app-icon *ngIf="crumb.icon" [name]="crumb.icon" class="tw-mr-1" />
        {{ crumb.label }}
      </a>

      <span *ngIf="last" class="breadcrumb-current">
        <app-icon *ngIf="crumb.icon" [name]="crumb.icon" class="tw-mr-1" />
        {{ crumb.label }}
      </span>
    </li>
  </ol>
</nav>
