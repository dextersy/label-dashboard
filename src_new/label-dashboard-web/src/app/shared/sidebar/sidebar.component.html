<div class="sidebar"
     [class.open]="isOpen"
     [class.collapsed]="isCollapsed && !isMobileView"
     [style.--active]="activeColor">

  <div class="sidebar-wrapper">

    <!-- Workspace indicator -->
    <div class="workspace-indicator"
         *ngIf="currentWorkspace"
         [class.workspace-indicator-clickable]="isCollapsed && !isMobileView && availableWorkspaceInfos.length > 1"
         (click)="onWorkspaceIndicatorClick()"
         [title]="isCollapsed && !isMobileView && availableWorkspaceInfos.length > 1 ? 'Switch workspace' : ''">
      <span class="workspace-icon-wrap">
        <app-icon [name]="getWorkspaceInfo(currentWorkspace).icon" iconOnly />
      </span>
      <span class="workspace-label">{{ getWorkspaceInfo(currentWorkspace).label }}</span>
    </div>

    <button class="switch-workspace-btn"
            *ngIf="availableWorkspaceInfos.length > 1"
            (click)="openWorkspaceSwitchModal()">
      <app-icon name="shuffle" iconOnly />
      <span>Switch workspace</span>
    </button>

    <!-- Nav -->
    <nav *ngIf="isInitialized">
      <ul class="nav-list">

        <ng-container *ngFor="let section of visibleSections">
          <ng-container *ngIf="shouldShowSection(section)">

            <li *ngIf="section.showArtistIndicator" class="artist-selection-container">
              <app-artist-selection
                [currentArtist]="selectedArtist"
                (artistSelected)="onArtistSelected($event)">
              </app-artist-selection>
            </li>

            <ng-container *ngFor="let item of section.items">
              <ng-container *ngTemplateOutlet="menuItemTemplate; context: { item: item }"></ng-container>
            </ng-container>

            <li *ngIf="section.id === 'dashboard'" class="nav-divider" aria-hidden="true"></li>

          </ng-container>
        </ng-container>

        <!-- Mobile-only: profile & logout -->
        <li class="nav-divider mobile-only" aria-hidden="true"></li>

        <li class="mobile-only">
          <a routerLink="/profile" (click)="onMenuItemClick()" class="nav-link">
            <span class="nav-icon"><app-icon name="edit" iconOnly /></span>
            <span class="nav-label">Edit Profile</span>
          </a>
        </li>

        <li class="mobile-only">
          <a (click)="logout(); onMenuItemClick()" class="nav-link tw-cursor-pointer">
            <span class="nav-icon"><app-icon name="info" class="fa-arrow-right-from-bracket" iconOnly /></span>
            <span class="nav-label">Log Out</span>
          </a>
        </li>

      </ul>
    </nav>

  </div><!-- /.sidebar-wrapper -->

  <!-- Menu item template -->
  <ng-template #menuItemTemplate let-item="item">
    <li class="nav-item"
        [class.is-active]="isActiveRoute(item.route) || isActiveParentRoute(item.route)"
        [ngClass]="getMenuItemClass(item.route)">

      <!-- Leaf item -->
      <a *ngIf="shouldShowMenuItem(item) && !hasChildren(item)"
         [routerLink]="item.route"
         (click)="onMenuItemClick(item)"
         class="nav-link"
         [class.nav-link-active]="isActiveRoute(item.route)"
         [title]="isCollapsed && !isMobileView ? item.title : ''">
        <span class="nav-icon"><app-icon [name]="item.icon" iconOnly /></span>
        <span class="nav-label">{{ item.title }}</span>
      </a>

      <!-- Parent item -->
      <div *ngIf="shouldShowMenuItem(item) && hasChildren(item)">
        <a (click)="onParentMenuClick($event, item)"
           class="nav-link nav-link-parent"
           [class.nav-link-active]="isActiveParentRoute(item.route)"
           [title]="isCollapsed && !isMobileView ? item.title : ''">
          <span class="nav-icon"><app-icon [name]="item.icon" iconOnly /></span>
          <span class="nav-label">{{ item.title }}</span>
          <app-icon name="chevron-down" iconOnly class="submenu-arrow" [class.rotated]="isSubmenuExpanded(item.route)" />
        </a>

        <!-- Submenu -->
        <ul class="submenu"
            [class.expanded]="isSubmenuExpanded(item.route) && (!isCollapsed || isMobileView)">
          <li *ngFor="let child of item.children">
            <a *ngIf="shouldShowMenuItem(child)"
               [routerLink]="child.route"
               (click)="onMenuItemClick(child)"
               class="submenu-link"
               [class.submenu-link-active]="isActiveRoute(child.route)">
              {{ child.title }}
            </a>
          </li>
        </ul>
      </div>

    </li>
  </ng-template>

</div>

<!-- Flyout (collapsed desktop) -->
<div class="flyout-panel"
     *ngIf="isCollapsed && !isMobileView && flyoutMenu"
     [style.top.px]="flyoutTop">
  <p class="flyout-title">{{ flyoutMenu.title }}</p>
  <ul class="flyout-list">
    <li *ngFor="let child of flyoutMenu.children">
      <a *ngIf="shouldShowMenuItem(child)"
         [routerLink]="child.route"
         (click)="closeFlyout(); onMenuItemClick(child)"
         class="flyout-link"
         [class.flyout-link-active]="isActiveRoute(child.route)">
        {{ child.title }}
      </a>
    </li>
  </ul>
</div>

<div class="flyout-backdrop"
     *ngIf="isCollapsed && !isMobileView && flyoutMenu"
     (click)="closeFlyout()">
</div>

<!-- Workspace Switch Modal -->
<div class="modal fade show" appModalToBody *ngIf="showWorkspaceSwitchModal" tabindex="-1" style="display:block;">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header tw-border-0 tw-px-6 tw-pt-5 tw-pb-2">
        <h5 class="modal-title tw-text-lg tw-font-semibold tw-text-gray-800">Switch Workspace</h5>
        <button type="button" class="btn-close" (click)="closeWorkspaceSwitchModal()"></button>
      </div>
      <div class="modal-body tw-px-6 tw-pb-6 tw-pt-2">
        <div class="workspace-options">
          <button *ngFor="let info of availableWorkspaceInfos"
                  class="workspace-option-btn"
                  [class.active]="info.type === currentWorkspace"
                  (click)="switchWorkspace(info.type)">
            <app-icon name="check" iconOnly class="workspace-option-check" *ngIf="info.type === currentWorkspace" />
            <app-icon [name]="info.icon" iconOnly class="workspace-option-icon" />
            <span class="workspace-option-name">{{ info.label }}</span>
            <span class="workspace-option-desc">{{ info.description }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" appModalToBody *ngIf="showWorkspaceSwitchModal"></div>
